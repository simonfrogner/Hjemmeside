<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    color: #fff;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, #0d0d2b 0%, #0a0a1a 70%);
    animation: bgPulse 8s ease-in-out infinite;
    z-index: -2;
  }

  @keyframes bgPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: rgba(0, 255, 255, 0.3);
    border-radius: 50%;
    animation: float linear infinite;
    z-index: -1;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
  }

  .game-wrapper {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    perspective: 1000px;
  }

  .side-panel {
    width: 160px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-box {
    background: rgba(10, 10, 40, 0.8);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.3);
  }

  .panel-box h3 {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0, 255, 255, 0.6);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .level-value {
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-align: center;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  .lines-value {
    font-size: 20px;
    font-weight: 700;
    color: #ffaa00;
    text-align: center;
  }

  #next-canvas {
    display: block;
    margin: 0 auto;
  }

  .game-board-container {
    position: relative;
    border-radius: 16px;
    padding: 3px;
    background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(255, 0, 255, 0.3), rgba(0, 255, 136, 0.3));
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), 0 0 80px rgba(255, 0, 255, 0.1);
    animation: borderGlow 4s ease-in-out infinite;
  }

  @keyframes borderGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), 0 0 80px rgba(255, 0, 255, 0.1); }
    50% { box-shadow: 0 0 60px rgba(0, 255, 255, 0.25), 0 0 120px rgba(255, 0, 255, 0.15); }
  }

  #game-canvas {
    display: block;
    border-radius: 14px;
    background: rgba(5, 5, 20, 0.95);
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 20, 0.85);
    border-radius: 14px;
    backdrop-filter: blur(5px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay h1 {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 8px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  .overlay p {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
    animation: blink 1.5s ease-in-out infinite;
  }

  .overlay .game-over-text {
    font-size: 28px;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    letter-spacing: 6px;
  }

  .overlay .final-score {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.7);
    margin: 16px 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .controls-info {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 1px;
    line-height: 2;
    text-align: center;
  }

  /* Line clear flash */
  @keyframes lineFlash {
    0% { background: rgba(255, 255, 255, 0.8); }
    100% { background: transparent; }
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 20;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    background: rgba(5, 5, 20, 0.95);
    border-top: 1px solid rgba(0, 255, 255, 0.15);
  }

  .mobile-controls-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .mobile-controls-row + .mobile-controls-row {
    margin-top: 6px;
  }

  .mobile-btn {
    width: 62px; height: 48px;
    border-radius: 12px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    background: rgba(10, 10, 40, 0.9);
    color: #00ffff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s, transform 0.1s;
  }

  .mobile-btn:active {
    background: rgba(0, 255, 255, 0.25);
    transform: scale(0.92);
  }

  .mobile-btn.wide {
    flex: 1;
    max-width: 130px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .mobile-btn.small {
    width: 40px; height: 40px;
    font-size: 15px;
    border-radius: 50%;
    color: rgba(0, 255, 255, 0.5);
    border-color: rgba(0, 255, 255, 0.15);
  }

  @media (max-width: 700px), (pointer: coarse) {
    body {
      padding: 0;
      align-items: flex-start;
    }
    .mobile-controls { display: block; }
    .game-wrapper {
      flex-direction: column;
      align-items: center;
      gap: 0;
      transform: none;
      width: 100%;
    }
    .side-panel {
      flex-direction: row;
      width: 100%;
      gap: 0;
      padding: 6px 10px;
      justify-content: center;
      align-items: center;
    }
    .side-panel .panel-box {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      padding: 2px 10px;
      min-width: 0;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .side-panel .panel-box h3 {
      font-size: 8px;
      margin-bottom: 0;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
    }
    .score-value { font-size: 14px; }
    .level-value { font-size: 14px; text-shadow: none; }
    .lines-value { font-size: 14px; }
    .controls-info { display: none !important; }
    /* Hide next-piece, mute button and neste panel on mobile */
    .side-panel .panel-box:has(#next-canvas),
    .side-panel .panel-box:has(#mute-btn) { display: none; }
    .game-board-container {
      padding: 2px;
      border-radius: 8px;
      animation: none;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }
    #game-canvas {
      border-radius: 6px;
    }
    .overlay h1 { font-size: 28px; letter-spacing: 4px; }
    .overlay .game-over-text { font-size: 22px; }
    .overlay p { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="side-panel">
    <div class="panel-box">
      <h3>Score</h3>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>Level</h3>
      <div class="level-value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>Lines</h3>
      <div class="lines-value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <h3>Neste</h3>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>
    <div class="panel-box controls-info">
      ← → FLYTT<br>
      ↑ ROTER<br>
      ↓ RASKERE<br>
      SPACE SLIPP<br>
      P PAUSE<br>
      M MUSIKK
    </div>
    <div class="panel-box" style="text-align:center;">
      <div id="mute-btn" onclick="BGM.toggleMute()" style="cursor:pointer;font-size:24px;user-select:none;">🔊</div>
    </div>
  </div>

  <div class="game-board-container">
    <canvas id="game-canvas" width="300" height="600"></canvas>
    <div class="overlay" id="start-overlay">
      <h1>TETRIS</h1>
      <p>TRYKK FOR Å STARTE</p>
    </div>
    <div class="overlay hidden" id="pause-overlay">
      <h1 style="font-size:28px">PAUSE</h1>
      <p>TRYKK P FOR Å FORTSETTE</p>
    </div>
    <div class="overlay hidden" id="gameover-overlay">
      <div class="game-over-text">GAME OVER</div>
      <div class="final-score" id="final-score"></div>
      <p>TRYKK FOR Å SPILLE IGJEN</p>
    </div>
  </div>
</div>

<div class="mobile-controls" id="mobile-controls">
  <div class="mobile-controls-row">
    <div class="mobile-btn" data-action="left">◀</div>
    <div class="mobile-btn" data-action="down">▼</div>
    <div class="mobile-btn" data-action="rotate">↻</div>
    <div class="mobile-btn" data-action="right">▶</div>
  </div>
  <div class="mobile-controls-row">
    <div class="mobile-btn wide" data-action="drop">DROP</div>
    <div class="mobile-btn small" data-action="pause">⏸</div>
    <div class="mobile-btn small" data-action="mute" id="mute-btn-mobile">🔊</div>
  </div>
</div>

<script>
// ── Audio Engine (Web Audio API) ──────────────────────
let audioCtx;
let audioUnlocked = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// iOS requires audio to be unlocked by playing a sound inside a user gesture.
// This plays a silent buffer to unlock, then removes the listeners.
function unlockAudio() {
  if (audioUnlocked) return;
  ensureAudio();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  src.onended = () => { audioUnlocked = true; };
  // Also force resume for iOS 17+
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

['touchstart', 'touchend', 'click'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { once: false, passive: true });
});

function playTone(freq, duration, type = 'square', volume = 0.12, detune = 0) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return; // iOS: skip if not yet unlocked
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2500;
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume = 0.08) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 800;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

const SFX = {
  move() {
    playTone(220, 0.06, 'square', 0.06);
  },
  rotate() {
    playTone(440, 0.08, 'square', 0.08);
    playTone(550, 0.06, 'square', 0.05);
  },
  softDrop() {
    playTone(150, 0.04, 'square', 0.05);
  },
  hardDrop() {
    playNoise(0.12, 0.15);
    playTone(100, 0.15, 'triangle', 0.12);
  },
  lock() {
    playTone(180, 0.1, 'triangle', 0.08);
    playNoise(0.06, 0.06);
  },
  lineClear(count) {
    const baseFreq = 330;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        playTone(baseFreq + i * 110, 0.2, 'square', 0.1);
        playTone(baseFreq + i * 110 + 5, 0.2, 'sawtooth', 0.04, 10);
      }, i * 60);
    }
    if (count === 4) {
      setTimeout(() => {
        playTone(880, 0.3, 'square', 0.12);
        playTone(1100, 0.25, 'sawtooth', 0.06);
        playNoise(0.15, 0.1);
      }, 250);
    }
  },
  levelUp() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.15, 'square', 0.1), i * 80);
    });
  },
  gameOver() {
    const notes = [440, 370, 311, 261];
    notes.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 0.4, 'sawtooth', 0.1);
        playTone(f, 0.4, 'square', 0.06, -8);
      }, i * 200);
    });
  },
  start() {
    const notes = [261, 329, 392, 523];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.12, 'square', 0.08), i * 70);
    });
  }
};

// ── Background Music (Korobeiniki) ───────────────────
const BGM = {
  playing: false,
  scheduledUntil: 0,
  timerId: null,
  masterGain: null,
  bpm: 140,
  muted: false,

  // Korobeiniki melody — note, duration in beats
  // E5 B4 C5 D5 C5 B4 A4 A4 C5 E5 D5 C5 B4 C5 D5 E5 C5 A4 A4 ...
  melody: [
    [659,2],[494,1],[523,1],[587,2],[523,1],[494,1],
    [440,2],[440,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],

    [587,2],[587,1],[698,1],[880,2],[784,1],[698,1],
    [659,2],[659,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],
  ],

  // Bass line (root notes, longer durations)
  bass: [
    [165,4],[131,4],[147,4],[131,4],
    [147,4],[165,4],[131,4],[110,4],
    [147,4],[175,4],[147,4],[131,4],
    [165,4],[131,4],[110,4],[110,4],
  ],

  start() {
    if (this.playing) return;
    unlockAudio();
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    this.playing = true;
    this.masterGain = audioCtx.createGain();
    this.masterGain.gain.value = this.muted ? 0 : 0.08;
    this.masterGain.connect(audioCtx.destination);
    this.scheduledUntil = audioCtx.currentTime + 0.1;
    this.scheduleAhead();
  },

  stop() {
    this.playing = false;
    if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    if (this.masterGain) {
      this.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      this.masterGain = null;
    }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.masterGain) {
      this.masterGain.gain.setValueAtTime(this.muted ? 0 : 0.08, audioCtx.currentTime);
    }
    const mb = document.getElementById('mute-btn');
    const mbm = document.getElementById('mute-btn-mobile');
    if (mb) mb.textContent = this.muted ? '🔇' : '🔊';
    if (mbm) mbm.textContent = this.muted ? '🔇' : '🔊';
  },

  scheduleAhead() {
    if (!this.playing || !this.masterGain) return;
    const lookAhead = 2; // seconds to schedule ahead
    while (this.scheduledUntil < audioCtx.currentTime + lookAhead) {
      this.scheduleMelodyPass(this.scheduledUntil);
      // Calculate total melody duration
      const beatLen = 60 / this.bpm;
      const totalBeats = this.melody.reduce((s, n) => s + n[1], 0);
      this.scheduledUntil += totalBeats * beatLen;
    }
    this.timerId = setTimeout(() => this.scheduleAhead(), 500);
  },

  scheduleMelodyPass(startTime) {
    const beatLen = 60 / this.bpm;

    // Schedule melody
    let t = startTime;
    for (const [freq, beats] of this.melody) {
      if (freq > 0) {
        this.scheduleNote(freq, t, beats * beatLen * 0.85, 'square', 0.7);
        // Harmony: add a quiet note a 5th below for richness
        this.scheduleNote(freq * 0.667, t, beats * beatLen * 0.6, 'triangle', 0.2);
      }
      t += beats * beatLen;
    }

    // Schedule bass — loop bass to fill melody duration
    const melodyDuration = t - startTime;
    const bassBeatTotal = this.bass.reduce((s, n) => s + n[1], 0);
    const bassDuration = bassBeatTotal * beatLen;
    let bt = startTime;
    while (bt < startTime + melodyDuration - 0.01) {
      for (const [freq, beats] of this.bass) {
        if (bt >= startTime + melodyDuration) break;
        if (freq > 0) {
          this.scheduleNote(freq, bt, beats * beatLen * 0.7, 'triangle', 0.5);
        }
        bt += beats * beatLen;
      }
    }

    // Schedule simple drum pattern
    let dt = startTime;
    const stepLen = beatLen;
    while (dt < startTime + melodyDuration - 0.01) {
      this.scheduleDrum(dt, 0.4); // kick on every beat
      if (Math.round((dt - startTime) / beatLen) % 2 === 1) {
        this.scheduleHihat(dt, 0.15); // hihat on off-beats
      }
      dt += stepLen;
    }
  },

  scheduleNote(freq, time, duration, type, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.setValueAtTime(vol * 0.12, time + duration * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + duration + 0.01);
  },

  scheduleDrum(time, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    gain.gain.setValueAtTime(vol * 0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + 0.12);
  },

  scheduleHihat(time, vol) {
    if (!this.masterGain) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 7000;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    src.start(time);
  }
};

// ── Constants ──────────────────────────────────────────
const COLS = 10, ROWS = 20, BLOCK = 30;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

// Tetromino shapes & colors (SRS)
const PIECES = [
  { shape: [[1,1,1,1]],             color: '#00ffff', glow: 'rgba(0,255,255,0.4)' },   // I
  { shape: [[1,0,0],[1,1,1]],       color: '#0066ff', glow: 'rgba(0,102,255,0.4)' },   // J
  { shape: [[0,0,1],[1,1,1]],       color: '#ff8800', glow: 'rgba(255,136,0,0.4)' },   // L
  { shape: [[1,1],[1,1]],           color: '#ffee00', glow: 'rgba(255,238,0,0.4)' },   // O
  { shape: [[0,1,1],[1,1,0]],       color: '#00ff66', glow: 'rgba(0,255,102,0.4)' },   // S
  { shape: [[0,1,0],[1,1,1]],       color: '#aa00ff', glow: 'rgba(170,0,255,0.4)' },   // T
  { shape: [[1,1,0],[0,1,1]],       color: '#ff0044', glow: 'rgba(255,0,68,0.4)' },    // Z
];

// ── State ──────────────────────────────────────────────
let board, current, next, score, lines, level, gameState, dropInterval, lastDrop;
let flashRows = [], flashTimer = 0;
let shakeAmount = 0;
let combo = 0;

// ── Background particles ──────────────────────────────
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
  document.body.appendChild(p);
}

// ── Helpers ───────────────────────────────────────────
function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    glow: p.glow,
    x: Math.floor((COLS - p.shape[0].length) / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const rotated = Array.from({ length: cols }, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      rotated[c][rows - 1 - r] = shape[r][c];
  return rotated;
}

function valid(shape, px, py) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c]) {
        const ny = current.y + r;
        if (ny < 0) { gameOver(); return; }
        board[ny][current.x + c] = { color: current.color, glow: current.glow };
      }
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) gameOver();
}

function clearLines() {
  const full = [];
  for (let r = 0; r < ROWS; r++)
    if (board[r].every(cell => cell)) full.push(r);

  if (full.length === 0) { combo = 0; SFX.lock(); return; }

  combo++;
  flashRows = full;
  flashTimer = 12;

  // Scoring: 100, 300, 500, 800 + combo bonus
  const pts = [0, 100, 300, 500, 800][full.length] * level;
  const comboBonus = combo > 1 ? 50 * (combo - 1) * level : 0;
  score += pts + comboBonus;
  lines += full.length;
  const prevLevel = level;
  level = Math.floor(lines / 10) + 1;
  dropInterval = Math.max(50, 800 - (level - 1) * 70);
  if (level > prevLevel) SFX.levelUp();

  shakeAmount = full.length >= 4 ? 8 : full.length >= 2 ? 4 : 2;
  SFX.lineClear(full.length);

  setTimeout(() => {
    for (const r of full) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
    }
  }, 150);

  updateUI();
}

function ghostY() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  return gy;
}

// ── Drawing ───────────────────────────────────────────
function drawBlock(context, x, y, color, glow, size = BLOCK, ghost = false) {
  const px = x * size, py = y * size;
  const inset = 1;

  if (ghost) {
    context.strokeStyle = color;
    context.globalAlpha = 0.25;
    context.lineWidth = 1.5;
    context.strokeRect(px + inset, py + inset, size - inset * 2, size - inset * 2);
    context.globalAlpha = 1;
    return;
  }

  // Glow
  context.shadowColor = glow;
  context.shadowBlur = 12;

  // Main block
  const grad = context.createLinearGradient(px, py, px + size, py + size);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  context.fillStyle = grad;
  context.fillRect(px + inset, py + inset, size - inset * 2, size - inset * 2);

  // Highlight
  context.shadowBlur = 0;
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(px + inset, py + inset, size - inset * 2, 3);
  context.fillRect(px + inset, py + inset, 3, size - inset * 2);

  // Inner shadow
  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.fillRect(px + size - inset - 3, py + inset, 3, size - inset * 2);
  context.fillRect(px + inset, py + size - inset - 3, size - inset * 2, 3);
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `rgb(${r},${g},${b})`;
}

function draw() {
  const B = window._mobileBlock || BLOCK;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Shake
  ctx.save();
  if (shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * shakeAmount;
    const sy = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(sx, sy);
    shakeAmount *= 0.85;
    if (shakeAmount < 0.3) shakeAmount = 0;
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * B); ctx.lineTo(canvas.width, r * B); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * B, 0); ctx.lineTo(c * B, canvas.height); ctx.stroke();
  }

  // Board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) {
        if (flashRows.includes(r) && flashTimer > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flashTimer / 12 * 0.8})`;
          ctx.fillRect(c * B, r * B, B, B);
        } else {
          drawBlock(ctx, c, r, board[r][c].color, board[r][c].glow, B);
        }
      }

  if (flashTimer > 0) flashTimer--;

  if (current && gameState === 'playing') {
    // Ghost piece
    const gy = ghostY();
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, gy + r, current.color, current.glow, B, true);

    // Current piece
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, current.y + r, current.color, current.glow, B);
  }

  ctx.restore();

  // Draw next piece
  drawNext();
}

function drawNext() {
  const size = 24;
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const offsetX = (nextCanvas.width - next.shape[0].length * size) / 2;
  const offsetY = (nextCanvas.height - next.shape.length * size) / 2;
  nextCtx.save();
  nextCtx.translate(offsetX, offsetY);
  for (let r = 0; r < next.shape.length; r++)
    for (let c = 0; c < next.shape[r].length; c++)
      if (next.shape[r][c]) {
        const px = c * size, py = r * size;
        nextCtx.shadowColor = next.glow;
        nextCtx.shadowBlur = 10;
        const grad = nextCtx.createLinearGradient(px, py, px + size, py + size);
        grad.addColorStop(0, next.color);
        grad.addColorStop(1, shadeColor(next.color, -30));
        nextCtx.fillStyle = grad;
        nextCtx.fillRect(px + 1, py + 1, size - 2, size - 2);
        nextCtx.shadowBlur = 0;
        nextCtx.fillStyle = 'rgba(255,255,255,0.15)';
        nextCtx.fillRect(px + 1, py + 1, size - 2, 2);
      }
  nextCtx.restore();
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

// ── Game Logic ────────────────────────────────────────
function init() {
  board = createBoard();
  score = 0; lines = 0; level = 1; combo = 0;
  dropInterval = 800;
  current = randomPiece();
  next = randomPiece();
  updateUI();
}

function gameOver() {
  gameState = 'over';
  BGM.stop();
  SFX.gameOver();
  document.getElementById('final-score').textContent = `SCORE: ${score.toLocaleString()}`;
  document.getElementById('gameover-overlay').classList.remove('hidden');
}

function showOverlay(id) {
  ['start-overlay', 'pause-overlay', 'gameover-overlay'].forEach(oid => {
    document.getElementById(oid).classList.toggle('hidden', oid !== id);
  });
}

function startGame() {
  unlockAudio();
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  SFX.start();
  init();
  gameState = 'playing';
  showOverlay(null);
  ['start-overlay', 'pause-overlay', 'gameover-overlay'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  if (typeof resizeCanvas === 'function') resizeCanvas();
  lastDrop = performance.now();
  BGM.stop();
  setTimeout(() => BGM.start(), 300);
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
  if (gameState !== 'playing') return;

  if (timestamp - lastDrop > dropInterval) {
    if (valid(current.shape, current.x, current.y + 1)) {
      current.y++;
    } else {
      lock();
    }
    lastDrop = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ── Input ─────────────────────────────────────────────
function handleInput(action) {
  if (gameState !== 'playing') return;
  switch (action) {
    case 'left':
      if (valid(current.shape, current.x - 1, current.y)) { current.x--; SFX.move(); }
      break;
    case 'right':
      if (valid(current.shape, current.x + 1, current.y)) { current.x++; SFX.move(); }
      break;
    case 'down':
      if (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 1;
        SFX.softDrop();
        updateUI();
      }
      break;
    case 'rotate': {
      const rotated = rotate(current.shape);
      let kicked = false;
      for (const kick of [0, -1, 1, -2, 2]) {
        if (valid(rotated, current.x + kick, current.y)) {
          current.shape = rotated;
          current.x += kick;
          kicked = true;
          break;
        }
      }
      if (kicked) SFX.rotate();
      break;
    }
    case 'drop':
      while (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 2;
      }
      SFX.hardDrop();
      lock();
      updateUI();
      lastDrop = performance.now();
      break;
  }
}

document.addEventListener('keydown', e => {
  if (gameState === 'over' && e.key !== 'p') { startGame(); return; }

  if (e.key === 'm' || e.key === 'M') {
    BGM.toggleMute();
    return;
  }

  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') {
      gameState = 'paused';
      BGM.stop();
      document.getElementById('pause-overlay').classList.remove('hidden');
    } else if (gameState === 'paused') {
      gameState = 'playing';
      BGM.start();
      document.getElementById('pause-overlay').classList.add('hidden');
      lastDrop = performance.now();
      requestAnimationFrame(gameLoop);
    }
    return;
  }

  const keyMap = {
    'ArrowLeft': 'left', 'ArrowRight': 'right',
    'ArrowDown': 'down', 'ArrowUp': 'rotate',
    ' ': 'drop'
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    handleInput(keyMap[e.key]);
  }
});

// Start on click/touch
['start-overlay', 'gameover-overlay'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('click', startGame);
  el.addEventListener('touchend', e => { e.preventDefault(); startGame(); }, { passive: false });
});

// ── Mobile touch handling ─────────────────────────────
(function() {
  // Button touch (with repeat for left/right/down)
  const controls = document.getElementById('mobile-controls');
  let repeatTimer = null, repeatInterval = null;

  function stopRepeat() {
    clearTimeout(repeatTimer);
    clearInterval(repeatInterval);
    repeatTimer = null;
    repeatInterval = null;
  }

  controls.addEventListener('touchstart', e => {
    e.preventDefault();
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'pause') {
      const ev = new KeyboardEvent('keydown', { key: 'p' });
      document.dispatchEvent(ev);
      return;
    }
    if (action === 'mute') {
      BGM.toggleMute();
      btn.textContent = BGM.muted ? '🔇' : '🔊';
      return;
    }

    if (gameState !== 'playing') return;
    handleInput(action);

    // Auto-repeat for directional buttons
    if (['left', 'right', 'down'].includes(action)) {
      stopRepeat();
      repeatTimer = setTimeout(() => {
        repeatInterval = setInterval(() => {
          if (gameState === 'playing') handleInput(action);
        }, 60);
      }, 180);
    }
  }, { passive: false });

  controls.addEventListener('touchend', e => {
    e.preventDefault();
    stopRepeat();
  }, { passive: false });

  controls.addEventListener('touchcancel', e => {
    stopRepeat();
  });

  // Swipe gestures on the game canvas
  const gameCanvas = document.getElementById('game-canvas');
  let touchStartX, touchStartY, touchStartTime, swiped;

  gameCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = Date.now();
    swiped = false;
  }, { passive: false });

  gameCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (gameState !== 'playing' || swiped) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const threshold = 30;

    if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
      handleInput(dx > 0 ? 'right' : 'left');
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    } else if (dy > threshold) {
      handleInput('down');
      touchStartY = t.clientY;
    }
  }, { passive: false });

  gameCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    const elapsed = Date.now() - touchStartTime;
    // Quick tap = rotate
    if (!swiped && elapsed < 200) {
      handleInput('rotate');
    }
  }, { passive: false });

  // Prevent page scroll/bounce/zoom
  document.addEventListener('touchmove', e => {
    if (e.target.closest('.game-board-container, .mobile-controls')) {
      e.preventDefault();
    }
  }, { passive: false });

  // Prevent double-tap zoom
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
})();

// ── Dynamic canvas scaling for mobile ─────────────────
function resizeCanvas() {
  const isMobile = window.innerWidth <= 700 || matchMedia('(pointer: coarse)').matches;
  if (!isMobile) {
    canvas.width = 300;
    canvas.height = 600;
    window._mobileBlock = null;
    return;
  }
  // Measure actual heights of fixed elements
  const mobileControls = document.getElementById('mobile-controls');
  const sidePanel = document.querySelector('.side-panel');
  // Force layout so we can measure
  const controlsH = mobileControls.offsetHeight || 110;
  const panelH = sidePanel ? sidePanel.offsetHeight : 30;
  const safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)')) || 0;
  const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-bottom)')) || 0;
  // Total available height = viewport - top info - bottom controls - some padding
  const availH = window.innerHeight - panelH - controlsH - 12;
  const availW = window.innerWidth - 8;
  const blockFromW = Math.floor(availW / COLS);
  const blockFromH = Math.floor(availH / ROWS);
  const block = Math.max(10, Math.min(blockFromW, blockFromH, 30));
  canvas.width = block * COLS;
  canvas.height = block * ROWS;
  window._mobileBlock = block;
}

window.addEventListener('resize', () => { resizeCanvas(); draw(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { resizeCanvas(); draw(); }, 200); });
resizeCanvas();

// Initial draw
init();
draw();
</script>
</body>
</html>

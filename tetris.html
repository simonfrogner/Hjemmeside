<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Tetris — Simon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f7;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: #1d1d1f;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* NAV */
  nav {
    position: sticky; top: 0;
    background: rgba(245,245,247,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 0 32px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
  }
  .nav-logo { font-weight: 600; font-size: 1rem; letter-spacing: -0.01em; }
  .nav-back { color: #0071e3; text-decoration: none; font-size: 0.9rem; transition: opacity 0.2s; }
  .nav-back:hover { opacity: 0.7; }

  /* GAME AREA */
  .game-area {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 32px 48px;
    min-height: calc(100dvh - 52px);
  }

  .game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .side-panel {
    width: 148px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel-box {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .panel-box h3 {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6e6e73;
    margin-bottom: 6px;
  }

  .score-value {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #0071e3;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .level-value {
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #1d1d1f;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .lines-value {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  #next-canvas {
    display: block;
    margin: 0 auto;
    border-radius: 8px;
  }

  .game-board-container {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.08);
  }

  #game-canvas {
    display: block;
    background: #0a0a14;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    background: rgba(5, 5, 20, 0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay h1 {
    font-size: 3.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    letter-spacing: 0.12em;
  }

  .overlay p {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }

  .overlay .game-over-text {
    font-size: 1.8rem;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 24px rgba(255,51,102,0.5);
    letter-spacing: 0.1em;
  }

  .overlay .final-score {
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
    margin: 12px 0;
  }

  /* Difficulty buttons */
  .diff-btns {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .diff-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(10,10,40,0.7);
    color: rgba(255,255,255,0.55);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .diff-btn:hover { background: rgba(0,255,255,0.12); color: #fff; }

  .diff-btn.active {
    border-color: #00ffff;
    background: rgba(0,255,255,0.18);
    color: #00ffff;
    box-shadow: 0 0 14px rgba(0,255,255,0.2);
  }

  /* Name input */
  .start-name-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(0,255,255,0.35);
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    text-align: center;
    text-transform: uppercase;
    width: 190px;
    margin-bottom: 14px;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
    touch-action: auto;
    transition: border-color 0.2s;
  }

  .start-name-input::placeholder { color: rgba(255,255,255,0.25); }
  .start-name-input:focus { border-color: rgba(0,255,255,0.7); }

  /* Controls info */
  .controls-info {
    font-size: 0.72rem;
    color: #a1a1a6;
    line-height: 2;
    text-align: center;
  }

  /* Highscore */
  .hs-list { list-style: none; margin: 0; padding: 0; font-size: 0.78rem; line-height: 2; }
  .hs-list li { color: #6e6e73; }
  .hs-list li.hs-current { color: #0071e3; font-weight: 700; }

  .new-hs-badge { font-size: 0.9rem; font-weight: 700; color: #ffee00; text-shadow: 0 0 10px rgba(255,238,0,0.5); letter-spacing: 0.05em; margin: 6px 0 2px; }
  .new-hs-badge.hidden { display: none; }

  .share-btn {
    margin-top: 10px;
    padding: 9px 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .share-btn:hover { opacity: 0.88; }
  .share-btn:active { transform: scale(0.95); }

  .gameover-hs { list-style: none; margin: 6px 0 0; padding: 0; font-size: 0.82rem; line-height: 1.9; text-align: center; }
  .gameover-hs li { color: rgba(255,255,255,0.4); }
  .gameover-hs li.hs-current { color: #ffee00; text-shadow: 0 0 8px rgba(255,238,0,0.5); font-weight: 700; }

  /* Mute button */
  .mute-icon {
    cursor: pointer; display: flex; justify-content: center; align-items: center;
    color: #6e6e73; transition: color 0.2s;
  }
  .mute-icon:hover { color: #1d1d1f; }

  /* Overlay variants */
  .overlay-h1-sm { font-size: 2rem; }
  .overlay-replay { margin-top: 14px; }

  /* Line clear flash */
  @keyframes lineFlash {
    0% { background: rgba(255,255,255,0.8); }
    100% { background: transparent; }
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    background: rgba(245,245,247,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  .mobile-controls-row { display: flex; justify-content: center; align-items: center; gap: 8px; }
  .mobile-controls-row + .mobile-controls-row { margin-top: 8px; }

  .mobile-btn {
    width: 62px; height: 48px;
    border-radius: 14px;
    border: 1.5px solid rgba(0,0,0,0.1);
    background: white;
    color: #1d1d1f;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s, transform 0.1s;
  }

  .mobile-btn:active { background: rgba(0,113,227,0.1); transform: scale(0.92); }
  .mobile-btn.wide { flex: 1; max-width: 130px; font-size: 0.85rem; font-weight: 700; }
  .mobile-btn.small { width: 44px; height: 44px; font-size: 16px; border-radius: 50%; }

  @media (max-width: 700px), (pointer: coarse) {
    body { overflow: auto; }
    nav { padding: 0 20px; }
    .mobile-controls { display: block; }
    .game-area { padding: 0 0 160px; align-items: flex-start; min-height: unset; }
    .game-wrapper { flex-direction: column; align-items: center; gap: 0; width: 100%; }
    .side-panel { flex-direction: row; width: 100%; gap: 0; padding: 8px 12px; justify-content: center; align-items: center; }
    .side-panel .panel-box { background: transparent; border: none; box-shadow: none; padding: 4px 10px; min-width: 0; border-radius: 0; display: flex; align-items: center; gap: 6px; }
    .side-panel .panel-box h3 { font-size: 0.6rem; margin-bottom: 0; color: #a1a1a6; }
    .score-value { font-size: 1rem; }
    .level-value { font-size: 1rem; }
    .lines-value { font-size: 1rem; }
    .controls-info { display: none !important; }
    .side-panel .panel-box:has(#next-canvas),
    .side-panel .panel-box:has(.theme-picker),
    .side-panel .panel-box:has(#mute-btn) { display: none; }
    .game-board-container { border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
    #game-canvas { border-radius: 0; }
    .overlay h1 { font-size: 2.5rem; }
    .overlay .game-over-text { font-size: 1.5rem; }
    .start-name-input { font-size: 0.9rem; width: 160px; }
    .diff-btns { gap: 6px; }
    .diff-btn { font-size: 0.8rem; padding: 8px 12px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html#hjem" class="nav-back">← Tilbake</a>
  <div class="nav-logo">Tetris</div>
</nav>

<div class="game-area">
<div class="game-wrapper">
  <div class="side-panel">
    <div class="panel-box">
      <h3>Poeng</h3>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>Nivå</h3>
      <div class="level-value" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>Linjer</h3>
      <div class="lines-value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <h3>Best</h3>
      <div class="score-value" id="best-score">—</div>
    </div>
    <div class="panel-box">
      <h3>Neste</h3>
      <canvas id="next-canvas" width="120" height="120"></canvas>
    </div>

    <div class="panel-box controls-info">
      ← → FLYTT<br>
      ↑ ROTER<br>
      ↓ RASKERE<br>
      SPACE SLIPP<br>
      P PAUSE<br>
      M MUSIKK
    </div>
    <div class="panel-box">
      <div id="mute-btn" class="mute-icon" onclick="BGM.toggleMute()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
    </div>
  </div>

  <div class="game-board-container">
    <canvas id="game-canvas" width="300" height="600"></canvas>
    <div class="overlay" id="start-overlay">
      <h1>TETRIS</h1>
      <input
        type="text"
        class="start-name-input"
        id="player-name-input"
        placeholder="DITT NAVN"
        maxlength="10"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <div class="diff-btns">
        <button class="diff-btn" data-diff="lett" onclick="startGame('lett')">LETT</button>
        <button class="diff-btn active" data-diff="normal" onclick="startGame('normal')">NORMAL</button>
        <button class="diff-btn" data-diff="hardt" onclick="startGame('hardt')">HARDT</button>
      </div>
    </div>
    <div class="overlay hidden" id="pause-overlay">
      <h1 class="overlay-h1-sm">PAUSE</h1>
      <p>TRYKK P FOR Å FORTSETTE</p>
    </div>
    <div class="overlay hidden" id="gameover-overlay">
      <div class="game-over-text">SPILL OVER</div>
      <div class="final-score" id="final-score"></div>
      <div class="new-hs-badge hidden" id="new-hs-badge">🏆 NY REKORD!</div>
      <ol class="gameover-hs" id="gameover-hs"></ol>
      <button class="share-btn" id="share-btn" onclick="shareScore(); event.stopPropagation();">DEL POENG</button>
      <p class="overlay-replay">TRYKK FOR Å SPILLE IGJEN</p>
    </div>
  </div>
</div>
</div>

<div class="mobile-controls" id="mobile-controls">
  <div class="mobile-controls-row">
    <div class="mobile-btn" data-action="left">◀</div>
    <div class="mobile-btn" data-action="down">▼</div>
    <div class="mobile-btn" data-action="rotate">↻</div>
    <div class="mobile-btn" data-action="right">▶</div>
  </div>
  <div class="mobile-controls-row">
    <div class="mobile-btn wide" data-action="drop">SLIPP</div>
    <div class="mobile-btn small" data-action="pause">⏸</div>
    <div class="mobile-btn small mute-icon" data-action="mute" id="mute-btn-mobile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </div>
  </div>
</div>

<script>
// ── Audio Engine (Web Audio API) ──────────────────────
let audioCtx;
let audioUnlocked = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function unlockAudio() {
  if (audioUnlocked) return;
  ensureAudio();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  src.onended = () => { audioUnlocked = true; };
}

['touchstart', 'touchend', 'click'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { once: false, passive: true });
});

function playTone(freq, duration, type = 'square', volume = 0.12, detune = 0) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2500;
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume = 0.08) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 800;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

const SFX = {
  move() {
    playTone(220, 0.06, 'square', 0.06);
  },
  rotate() {
    playTone(440, 0.08, 'square', 0.08);
    playTone(550, 0.06, 'square', 0.05);
  },
  softDrop() {
    playTone(150, 0.04, 'square', 0.05);
  },
  hardDrop() {
    playNoise(0.12, 0.15);
    playTone(100, 0.15, 'triangle', 0.12);
  },
  lock() {
    playTone(180, 0.1, 'triangle', 0.08);
    playNoise(0.06, 0.06);
  },
  lineClear(count) {
    const baseFreq = 330;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        playTone(baseFreq + i * 110, 0.2, 'square', 0.1);
        playTone(baseFreq + i * 110 + 5, 0.2, 'sawtooth', 0.04, 10);
      }, i * 60);
    }
    if (count === 4) {
      setTimeout(() => {
        playTone(880, 0.3, 'square', 0.12);
        playTone(1100, 0.25, 'sawtooth', 0.06);
        playNoise(0.15, 0.1);
      }, 250);
    }
  },
  levelUp() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.15, 'square', 0.1), i * 80);
    });
  },
  gameOver() {
    const notes = [440, 370, 311, 261];
    notes.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 0.4, 'sawtooth', 0.1);
        playTone(f, 0.4, 'square', 0.06, -8);
      }, i * 200);
    });
  },
  start() {
    const notes = [261, 329, 392, 523];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.12, 'square', 0.08), i * 70);
    });
  }
};

// ── Background Music (Korobeiniki) ───────────────────
const BGM = {
  playing: false,
  scheduledUntil: 0,
  timerId: null,
  masterGain: null,
  bpm: 140,
  muted: false,

  melody: [
    [659,2],[494,1],[523,1],[587,2],[523,1],[494,1],
    [440,2],[440,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],

    [587,2],[587,1],[698,1],[880,2],[784,1],[698,1],
    [659,2],[659,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],
  ],

  bass: [
    [165,4],[131,4],[147,4],[131,4],
    [147,4],[165,4],[131,4],[110,4],
    [147,4],[175,4],[147,4],[131,4],
    [165,4],[131,4],[110,4],[110,4],
  ],

  start() {
    if (this.playing) return;
    unlockAudio();
    this.playing = true;
    this.masterGain = audioCtx.createGain();
    this.masterGain.gain.value = this.muted ? 0 : 0.08;
    this.masterGain.connect(audioCtx.destination);
    this.scheduledUntil = audioCtx.currentTime + 0.1;
    this.scheduleAhead();
  },

  stop() {
    this.playing = false;
    if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    if (this.masterGain) {
      this.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      this.masterGain = null;
    }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.masterGain) {
      this.masterGain.gain.setValueAtTime(this.muted ? 0 : 0.08, audioCtx.currentTime);
    }
    const mb = document.getElementById('mute-btn');
    const mbm = document.getElementById('mute-btn-mobile');
    const icon = (s, muted) => muted
      ? `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
      : `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
    if (mb)  mb.innerHTML  = icon(22, this.muted);
    if (mbm) mbm.innerHTML = icon(18, this.muted);
  },

  scheduleAhead() {
    if (!this.playing || !this.masterGain) return;
    const lookAhead = 2;
    while (this.scheduledUntil < audioCtx.currentTime + lookAhead) {
      this.scheduleMelodyPass(this.scheduledUntil);
      const beatLen = 60 / this.bpm;
      const totalBeats = this.melody.reduce((s, n) => s + n[1], 0);
      this.scheduledUntil += totalBeats * beatLen;
    }
    this.timerId = setTimeout(() => this.scheduleAhead(), 500);
  },

  scheduleMelodyPass(startTime) {
    const beatLen = 60 / this.bpm;

    let t = startTime;
    for (const [freq, beats] of this.melody) {
      if (freq > 0) {
        this.scheduleNote(freq, t, beats * beatLen * 0.85, 'square', 0.7);
        this.scheduleNote(freq * 0.667, t, beats * beatLen * 0.6, 'triangle', 0.2);
      }
      t += beats * beatLen;
    }

    const melodyDuration = t - startTime;
    let bt = startTime;
    while (bt < startTime + melodyDuration - 0.01) {
      for (const [freq, beats] of this.bass) {
        if (bt >= startTime + melodyDuration) break;
        if (freq > 0) {
          this.scheduleNote(freq, bt, beats * beatLen * 0.7, 'triangle', 0.5);
        }
        bt += beats * beatLen;
      }
    }

    let dt = startTime;
    const stepLen = beatLen;
    while (dt < startTime + melodyDuration - 0.01) {
      this.scheduleDrum(dt, 0.4);
      if (Math.round((dt - startTime) / beatLen) % 2 === 1) {
        this.scheduleHihat(dt, 0.15);
      }
      dt += stepLen;
    }
  },

  scheduleNote(freq, time, duration, type, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.setValueAtTime(vol * 0.12, time + duration * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + duration + 0.01);
  },

  scheduleDrum(time, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    gain.gain.setValueAtTime(vol * 0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + 0.12);
  },

  scheduleHihat(time, vol) {
    if (!this.masterGain) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 7000;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    src.start(time);
  }
};

// ── Brikker ────────────────────────────────────────────
const PIECES = [
  { shape: [[1,1,1,1]],             color: '#00ffff', glow: 'rgba(0,255,255,0.4)' },
  { shape: [[1,0,0],[1,1,1]],       color: '#0066ff', glow: 'rgba(0,102,255,0.4)' },
  { shape: [[0,0,1],[1,1,1]],       color: '#ff8800', glow: 'rgba(255,136,0,0.4)' },
  { shape: [[1,1],[1,1]],           color: '#ffee00', glow: 'rgba(255,238,0,0.4)' },
  { shape: [[0,1,1],[1,1,0]],       color: '#00ff66', glow: 'rgba(0,255,102,0.4)' },
  { shape: [[0,1,0],[1,1,1]],       color: '#aa00ff', glow: 'rgba(170,0,255,0.4)' },
  { shape: [[1,1,0],[0,1,1]],       color: '#ff0044', glow: 'rgba(255,0,68,0.4)' },
];

// ── Highscore (with name support) ────────────────────
function getPlayerName() {
  return (localStorage.getItem('tetris-name') || '').toUpperCase();
}

function savePlayerName(name) {
  localStorage.setItem('tetris-name', name.toUpperCase().trim().slice(0, 10));
}

function getHighscores() {
  try {
    const raw = JSON.parse(localStorage.getItem('tetris-hs') || '[]');
    // Migrate old number-only format
    return raw.map(entry => {
      if (typeof entry === 'number') return { name: '???', score: entry };
      return entry;
    });
  } catch { return []; }
}

function saveHighscore(s, name) {
  const hs = getHighscores();
  hs.push({ name: name || '???', score: s });
  hs.sort((a, b) => b.score - a.score);
  const top5 = hs.slice(0, 5);
  localStorage.setItem('tetris-hs', JSON.stringify(top5));
  return top5;
}

function renderSideHs() {
  const hs = getHighscores();
  document.getElementById('best-score').textContent = hs.length ? hs[0].score.toLocaleString() : '—';
}

function renderGameoverHs(newScore) {
  const hs = getHighscores();
  const badge = document.getElementById('new-hs-badge');
  badge.classList.toggle('hidden', !hs.length || hs[0].score !== newScore);
  const list = document.getElementById('gameover-hs');
  let marked = false;
  list.innerHTML = hs.map((entry, i) => {
    const isCurrent = !marked && entry.score === newScore;
    if (isCurrent) marked = true;
    const nameStr = entry.name ? entry.name + ' – ' : '';
    return `<li class="${isCurrent ? 'hs-current' : ''}">${i + 1}. ${nameStr}${entry.score.toLocaleString()}</li>`;
  }).join('');
}

function shareScore() {
  const name = getPlayerName() || 'Du';
  const text = `${name} fikk ${score.toLocaleString()} poeng i Simon sitt Tetris! 🎮`;
  const btn = document.getElementById('share-btn');
  if (navigator.share) {
    navigator.share({ title: 'Tetris Score', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'KOPIERT! ✓';
      setTimeout(() => btn.textContent = 'DEL POENG', 2000);
    });
  }
}

// ── Constants ──────────────────────────────────────────
const COLS = 10, ROWS = 20, BLOCK = 30;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

// ── Difficulty config ─────────────────────────────────
const DIFF_CONFIG = {
  lett:   { startInterval: 1100, minInterval: 150 },
  normal: { startInterval: 800,  minInterval: 50  },
  hardt:  { startInterval: 450,  minInterval: 30  },
};

// ── State ──────────────────────────────────────────────
let board, current, next, score, lines, level, gameState, dropInterval, lastDrop;
let flashRows = [], flashTimer = 0;
let shakeAmount = 0;
let combo = 0;
let currentDifficulty = 'normal';
let particles = [];

// ── Helpers ───────────────────────────────────────────
function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    glow: p.glow,
    x: Math.floor((COLS - p.shape[0].length) / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const rotated = Array.from({ length: cols }, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      rotated[c][rows - 1 - r] = shape[r][c];
  return rotated;
}

function valid(shape, px, py) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c]) {
        const ny = current.y + r;
        if (ny < 0) { gameOver(); return; }
        board[ny][current.x + c] = { color: current.color, glow: current.glow };
      }
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) gameOver();
}

function spawnParticles(fullRows) {
  const B = window._mobileBlock || BLOCK;
  for (const r of fullRows) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (!cell) continue;
      const count = 4;
      for (let i = 0; i < count; i++) {
        const cx = (c + 0.5) * B;
        const cy = (r + 0.5) * B;
        particles.push({
          x: cx,
          y: cy,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.8) * 6,
          color: cell.color,
          alpha: 1,
          size: 3 + Math.random() * 3
        });
      }
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25; // gravity
    p.alpha -= 0.025;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }
}

function clearLines() {
  const full = [];
  for (let r = 0; r < ROWS; r++)
    if (board[r].every(cell => cell)) full.push(r);

  if (full.length === 0) { combo = 0; SFX.lock(); return; }

  // Vibration
  if (navigator.vibrate) {
    if (full.length === 4) {
      navigator.vibrate([80, 30, 80]);
    } else {
      navigator.vibrate(30 * full.length);
    }
  }

  // Spawn particles BEFORE removing rows
  spawnParticles(full);

  combo++;
  flashRows = full;
  flashTimer = 12;

  const pts = [0, 100, 300, 500, 800][full.length] * level;
  const comboBonus = combo > 1 ? 50 * (combo - 1) * level : 0;
  score += pts + comboBonus;
  lines += full.length;
  const prevLevel = level;
  level = Math.floor(lines / 10) + 1;

  const cfg = DIFF_CONFIG[currentDifficulty];
  dropInterval = Math.max(cfg.minInterval, cfg.startInterval - (level - 1) * 70);

  if (level > prevLevel) SFX.levelUp();

  shakeAmount = full.length >= 4 ? 8 : full.length >= 2 ? 4 : 2;
  SFX.lineClear(full.length);

  setTimeout(() => {
    for (const r of full) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
    }
  }, 150);

  updateUI();
}

function ghostY() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  return gy;
}

// ── Drawing ───────────────────────────────────────────
function drawBlock(context, x, y, color, glow, size = BLOCK, ghost = false) {
  const px = x * size, py = y * size;
  const inset = 1;

  if (ghost) {
    context.strokeStyle = color;
    context.globalAlpha = 0.25;
    context.lineWidth = 1.5;
    context.strokeRect(px + inset, py + inset, size - inset * 2, size - inset * 2);
    context.globalAlpha = 1;
    return;
  }

  context.shadowColor = glow;
  context.shadowBlur = 12;

  const grad = context.createLinearGradient(px, py, px + size, py + size);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  context.fillStyle = grad;
  context.fillRect(px + inset, py + inset, size - inset * 2, size - inset * 2);

  context.shadowBlur = 0;
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(px + inset, py + inset, size - inset * 2, 3);
  context.fillRect(px + inset, py + inset, 3, size - inset * 2);

  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.fillRect(px + size - inset - 3, py + inset, 3, size - inset * 2);
  context.fillRect(px + inset, py + size - inset - 3, size - inset * 2, 3);
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `rgb(${r},${g},${b})`;
}

function draw() {
  const B = window._mobileBlock || BLOCK;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * shakeAmount;
    const sy = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(sx, sy);
    shakeAmount *= 0.85;
    if (shakeAmount < 0.3) shakeAmount = 0;
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * B); ctx.lineTo(canvas.width, r * B); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * B, 0); ctx.lineTo(c * B, canvas.height); ctx.stroke();
  }

  // Board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) {
        if (flashRows.includes(r) && flashTimer > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flashTimer / 12 * 0.8})`;
          ctx.fillRect(c * B, r * B, B, B);
        } else {
          drawBlock(ctx, c, r, board[r][c].color, board[r][c].glow, B);
        }
      }

  if (flashTimer > 0) flashTimer--;

  if (current && gameState === 'playing') {
    // Ghost piece
    const gy = ghostY();
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, gy + r, current.color, current.glow, B, true);

    // Current piece
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, current.y + r, current.color, current.glow, B);
  }

  // Particles
  updateParticles();
  drawParticles();

  ctx.restore();

  drawNext();
}

function drawNext() {
  const size = 24;
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const offsetX = (nextCanvas.width - next.shape[0].length * size) / 2;
  const offsetY = (nextCanvas.height - next.shape.length * size) / 2;
  nextCtx.save();
  nextCtx.translate(offsetX, offsetY);
  for (let r = 0; r < next.shape.length; r++)
    for (let c = 0; c < next.shape[r].length; c++)
      if (next.shape[r][c]) {
        const px = c * size, py = r * size;
        nextCtx.shadowColor = next.glow;
        nextCtx.shadowBlur = 10;
        const grad = nextCtx.createLinearGradient(px, py, px + size, py + size);
        grad.addColorStop(0, next.color);
        grad.addColorStop(1, shadeColor(next.color, -30));
        nextCtx.fillStyle = grad;
        nextCtx.fillRect(px + 1, py + 1, size - 2, size - 2);
        nextCtx.shadowBlur = 0;
        nextCtx.fillStyle = 'rgba(255,255,255,0.15)';
        nextCtx.fillRect(px + 1, py + 1, size - 2, 2);
      }
  nextCtx.restore();
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

// ── Game Logic ────────────────────────────────────────
function init(diff) {
  board = createBoard();
  score = 0; lines = 0; level = 1; combo = 0;
  particles = [];
  const cfg = DIFF_CONFIG[diff || 'normal'];
  dropInterval = cfg.startInterval;
  current = randomPiece();
  next = randomPiece();
  updateUI();
}

function gameOver() {
  gameState = 'over';
  BGM.stop();
  SFX.gameOver();
  const name = getPlayerName();
  saveHighscore(score, name);
  renderSideHs();
  renderGameoverHs(score);
  document.getElementById('final-score').textContent = `POENG: ${score.toLocaleString()}`;
  document.getElementById('gameover-overlay').classList.remove('hidden');
}

function startGame(diff) {
  // Save name from input if on start screen
  const nameInput = document.getElementById('player-name-input');
  if (nameInput && nameInput.value.trim()) {
    savePlayerName(nameInput.value);
  }

  const useDiff = diff || currentDifficulty;
  currentDifficulty = useDiff;

  unlockAudio();
  SFX.start();
  init(useDiff);
  gameState = 'playing';
  ['start-overlay', 'pause-overlay', 'gameover-overlay'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  if (typeof resizeCanvas === 'function') resizeCanvas();
  lastDrop = performance.now();
  BGM.stop();
  setTimeout(() => BGM.start(), 300);
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
  if (gameState !== 'playing') return;

  if (timestamp - lastDrop > dropInterval) {
    if (valid(current.shape, current.x, current.y + 1)) {
      current.y++;
    } else {
      lock();
    }
    lastDrop = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ── Input ─────────────────────────────────────────────
function handleInput(action) {
  if (gameState !== 'playing') return;
  switch (action) {
    case 'left':
      if (valid(current.shape, current.x - 1, current.y)) { current.x--; SFX.move(); }
      break;
    case 'right':
      if (valid(current.shape, current.x + 1, current.y)) { current.x++; SFX.move(); }
      break;
    case 'down':
      if (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 1;
        SFX.softDrop();
        updateUI();
      }
      break;
    case 'rotate': {
      const rotated = rotate(current.shape);
      let kicked = false;
      for (const kick of [0, -1, 1, -2, 2]) {
        if (valid(rotated, current.x + kick, current.y)) {
          current.shape = rotated;
          current.x += kick;
          kicked = true;
          break;
        }
      }
      if (kicked) SFX.rotate();
      break;
    }
    case 'drop':
      while (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 2;
      }
      SFX.hardDrop();
      lock();
      updateUI();
      lastDrop = performance.now();
      break;
  }
}

document.addEventListener('keydown', e => {
  if (gameState === 'over' && e.key !== 'p' && e.key !== 'P') {
    startGame(currentDifficulty);
    return;
  }

  if (e.key === 'm' || e.key === 'M') {
    BGM.toggleMute();
    return;
  }

  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') {
      gameState = 'paused';
      BGM.stop();
      document.getElementById('pause-overlay').classList.remove('hidden');
    } else if (gameState === 'paused') {
      gameState = 'playing';
      BGM.start();
      document.getElementById('pause-overlay').classList.add('hidden');
      lastDrop = performance.now();
      requestAnimationFrame(gameLoop);
    }
    return;
  }

  const keyMap = {
    'ArrowLeft': 'left', 'ArrowRight': 'right',
    'ArrowDown': 'down', 'ArrowUp': 'rotate',
    ' ': 'drop'
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    handleInput(keyMap[e.key]);
  }
});

// Start on click: only gameover restarts (not start-overlay)
document.getElementById('gameover-overlay').addEventListener('click', () => startGame(currentDifficulty));
document.getElementById('gameover-overlay').addEventListener('touchend', e => {
  e.preventDefault();
  startGame(currentDifficulty);
}, { passive: false });

// Prevent clicks on start-overlay from bubbling to diff buttons (already handled by onclick)
// Highlight selected diff button
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  btn.addEventListener('mouseleave', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.diff-btn[data-diff="${currentDifficulty}"]`).classList.add('active');
  });
});

// Restore diff button highlight on page load
document.querySelector(`.diff-btn[data-diff="normal"]`).classList.add('active');

// ── Mobile touch handling ─────────────────────────────
(function() {
  const controls = document.getElementById('mobile-controls');
  let repeatTimer = null, repeatInterval = null;

  function stopRepeat() {
    clearTimeout(repeatTimer);
    clearInterval(repeatInterval);
    repeatTimer = null;
    repeatInterval = null;
  }

  controls.addEventListener('touchstart', e => {
    e.preventDefault();
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'pause') {
      const ev = new KeyboardEvent('keydown', { key: 'p' });
      document.dispatchEvent(ev);
      return;
    }
    if (action === 'mute') {
      BGM.toggleMute();
      return;
    }

    if (gameState !== 'playing') return;
    handleInput(action);

    if (['left', 'right', 'down'].includes(action)) {
      stopRepeat();
      repeatTimer = setTimeout(() => {
        repeatInterval = setInterval(() => {
          if (gameState === 'playing') handleInput(action);
        }, 60);
      }, 180);
    }
  }, { passive: false });

  controls.addEventListener('touchend', e => {
    e.preventDefault();
    stopRepeat();
  }, { passive: false });

  controls.addEventListener('touchcancel', e => {
    stopRepeat();
  });

  // Swipe gestures on the game canvas
  const gameCanvas = document.getElementById('game-canvas');
  let touchStartX, touchStartY, touchStartTime, swiped;

  gameCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = Date.now();
    swiped = false;
  }, { passive: false });

  gameCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (gameState !== 'playing' || swiped) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const threshold = 30;

    if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
      handleInput(dx > 0 ? 'right' : 'left');
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    } else if (dy > threshold) {
      handleInput('down');
      touchStartY = t.clientY;
    }
  }, { passive: false });

  gameCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    const elapsed = Date.now() - touchStartTime;
    if (!swiped && elapsed < 200) {
      handleInput('rotate');
    }
  }, { passive: false });

  // Prevent page scroll/bounce/zoom
  document.addEventListener('touchmove', e => {
    if (e.target.closest('.game-board-container, .mobile-controls')) {
      e.preventDefault();
    }
  }, { passive: false });

  // Prevent double-tap zoom
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    // Allow text input interactions
    if (e.target.tagName === 'INPUT') return;
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
})();

// ── Dynamic canvas scaling for mobile ─────────────────
function resizeCanvas() {
  const isMobile = window.innerWidth <= 700 || matchMedia('(pointer: coarse)').matches;
  if (!isMobile) {
    canvas.width = 300;
    canvas.height = 600;
    window._mobileBlock = null;
    return;
  }
  const mobileControls = document.getElementById('mobile-controls');
  const sidePanel = document.querySelector('.side-panel');
  const controlsH = mobileControls.offsetHeight || 110;
  const panelH = sidePanel ? sidePanel.offsetHeight : 30;
  const availH = window.innerHeight - panelH - controlsH - 12;
  const availW = window.innerWidth - 8;
  const blockFromW = Math.floor(availW / COLS);
  const blockFromH = Math.floor(availH / ROWS);
  const block = Math.max(10, Math.min(blockFromW, blockFromH, 30));
  canvas.width = block * COLS;
  canvas.height = block * ROWS;
  window._mobileBlock = block;
}

window.addEventListener('resize', () => { resizeCanvas(); draw(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { resizeCanvas(); draw(); }, 200); });
resizeCanvas();

// ── Name input: allow text input (override user-select) ──
const nameInput = document.getElementById('player-name-input');
nameInput.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: true });
nameInput.addEventListener('input', () => {
  nameInput.value = nameInput.value.toUpperCase();
});
// Load saved name
const savedName = getPlayerName();
if (savedName) nameInput.value = savedName;

// ── Init ──────────────────────────────────────────────
init('normal');
renderSideHs();
draw();
</script>
</body>
</html>

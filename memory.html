<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Memory — Simon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f7;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: #1d1d1f;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* NAV */
  nav {
    position: sticky; top: 0;
    background: rgba(245,245,247,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 0 32px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
  }
  .nav-logo { font-weight: 600; font-size: 1rem; letter-spacing: -0.01em; }
  .nav-back { color: #0071e3; text-decoration: none; font-size: 0.9rem; transition: opacity 0.2s; }
  .nav-back:hover { opacity: 0.7; }

  /* MAIN */
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    gap: 24px;
  }

  /* MODUS-VELGER */
  .modus-velger {
    display: flex;
    background: rgba(0,0,0,0.06);
    border-radius: 980px;
    padding: 3px;
    gap: 2px;
  }
  .modus-knapp {
    padding: 7px 20px;
    border: none;
    border-radius: 980px;
    background: transparent;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    color: #6e6e73;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .modus-knapp.aktiv {
    background: white;
    color: #1d1d1f;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  /* STATS — enkeltspiller */
  .stats {
    display: flex;
    gap: 12px;
  }
  .stat-boks {
    background: white;
    border: 1.5px solid rgba(0,0,0,0.07);
    border-radius: 16px;
    padding: 12px 20px;
    text-align: center;
    min-width: 82px;
  }
  .stat-verdi {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
  }
  .stat-label {
    font-size: 0.72rem;
    color: #6e6e73;
    margin-top: 2px;
    font-weight: 500;
  }

  /* REKORD */
  .rekord-rad {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: #6e6e73;
  }
  .rekord-item { display: flex; align-items: center; gap: 5px; }
  .rekord-item span { color: #ff9500; font-weight: 600; }

  /* MULTIPLAYER SCOREBOARD */
  .mp-board {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }
  .mp-spiller {
    flex: 1;
    background: white;
    border: 2px solid rgba(0,0,0,0.07);
    border-radius: 20px;
    padding: 14px 16px;
    text-align: center;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .mp-spiller.aktiv-spiller {
    border-color: #0071e3;
    box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
    transform: translateY(-2px);
  }
  .mp-spiller.aktiv-spiller .mp-navn { color: #0071e3; }
  .mp-navn {
    font-size: 0.8rem;
    font-weight: 600;
    color: #6e6e73;
    margin-bottom: 4px;
    transition: color 0.25s;
  }
  .mp-poeng {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #1d1d1f;
  }
  .mp-tur-pil {
    font-size: 0.75rem;
    color: #0071e3;
    margin-top: 4px;
    min-height: 1.1em;
  }

  /* TUR-BANNER */
  .tur-banner {
    font-size: 0.9rem;
    font-weight: 600;
    color: #0071e3;
    background: rgba(0,113,227,0.08);
    padding: 8px 20px;
    border-radius: 980px;
  }

  /* GRID */
  .kort-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 420px;
  }

  /* KORT */
  .kort {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 600px;
  }
  .kort-indre {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .kort.snudd .kort-indre,
  .kort.matchet .kort-indre {
    transform: rotateY(180deg);
  }
  .kort-forside,
  .kort-bakside {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .kort-forside {
    background: white;
    border: 1.5px solid rgba(0,0,0,0.07);
    font-size: 1.6rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: background 0.15s;
  }
  .kort:not(.snudd):not(.matchet) .kort-forside:hover {
    background: #f0f0f5;
  }
  .kort-bakside {
    background: #0071e3;
    transform: rotateY(180deg);
    font-size: 1.8rem;
  }
  .kort.matchet.spiller1 .kort-bakside { background: #0071e3; }
  .kort.matchet.spiller2 .kort-bakside { background: #ff2d55; }
  .kort.matchet:not(.spiller1):not(.spiller2) .kort-bakside { background: #34c759; }
  .kort.feil .kort-indre {
    animation: ryst 0.4s ease;
  }

  @keyframes ryst {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    20%      { transform: rotateY(180deg) translateX(-6px); }
    60%      { transform: rotateY(180deg) translateX(6px); }
  }

  /* KNAPPER */
  .knapp-rad {
    display: flex;
    gap: 12px;
  }
  .spill-knapp {
    padding: 12px 28px;
    background: #0071e3;
    color: white;
    border: none;
    border-radius: 980px;
    font-size: 0.95rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .spill-knapp:hover  { background: #0077ed; }
  .spill-knapp:active { transform: scale(0.97); }

  /* SEIER-OVERLAY */
  .seier-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .seier-overlay.synlig { display: flex; }
  .seier-boks {
    background: white;
    border-radius: 28px;
    padding: 40px 44px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    max-width: 340px;
    width: 100%;
    animation: popInn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popInn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .seier-emoji  { font-size: 3.5rem; line-height: 1; }
  .seier-tittel { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; }
  .seier-score  { display: flex; gap: 20px; margin: 8px 0 4px; }
  .seier-score-item { text-align: center; }
  .seier-score-verdi { font-size: 1.4rem; font-weight: 700; color: #0071e3; letter-spacing: -0.02em; }
  .seier-score-label { font-size: 0.72rem; color: #6e6e73; font-weight: 500; margin-top: 2px; }
  .seier-rekord {
    font-size: 0.82rem; color: #ff9500; font-weight: 600;
    background: rgba(255,149,0,0.1); padding: 5px 14px; border-radius: 980px;
  }
  .seier-rekord.skjult { display: none; }

  /* MP SEIER */
  .mp-seier-rad {
    display: flex;
    gap: 16px;
    margin: 4px 0;
  }
  .mp-seier-spiller {
    text-align: center;
  }
  .mp-seier-poeng {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .mp-seier-navn {
    font-size: 0.75rem;
    color: #6e6e73;
    font-weight: 500;
    margin-top: 2px;
  }
  .mp-seier-vinner-badge {
    font-size: 0.8rem;
    font-weight: 600;
    background: rgba(52,199,89,0.12);
    color: #34c759;
    padding: 4px 12px;
    border-radius: 980px;
  }
  .mp-seier-vinner-badge.skjult { display: none; }

  /* KONFETTI */
  #konfetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 199;
  }

  /* DARK MODE */
  body.dark { background: #000; color: #f5f5f7; }
  body.dark nav { background: rgba(29,29,31,0.85); border-color: rgba(255,255,255,0.08); }
  body.dark .nav-back { color: #2997ff; }
  body.dark .nav-logo { color: #f5f5f7; }
  body.dark .modus-velger { background: rgba(255,255,255,0.1); }
  body.dark .modus-knapp.aktiv { background: #2c2c2e; color: #f5f5f7; }
  body.dark .modus-knapp { color: #a1a1a6; }
  body.dark .stat-boks { background: #1c1c1e; border-color: rgba(255,255,255,0.07); }
  body.dark .stat-verdi { color: #f5f5f7; }
  body.dark .mp-spiller { background: #1c1c1e; border-color: rgba(255,255,255,0.07); }
  body.dark .mp-poeng { color: #f5f5f7; }
  body.dark .kort-forside { background: #2c2c2e; border-color: rgba(255,255,255,0.1); }
  body.dark .kort:not(.snudd):not(.matchet) .kort-forside:hover { background: #3a3a3c; }
  body.dark .seier-boks { background: #1c1c1e; }
  body.dark .seier-tittel { color: #f5f5f7; }
  body.dark .mp-seier-poeng { color: #f5f5f7; }
</style>
</head>
<body>

<nav>
  <a href="index.html#hjem" class="nav-back">← Tilbake</a>
  <div class="nav-logo">Memory</div>
</nav>

<canvas id="konfetti-canvas"></canvas>

<div class="game-area">

  <!-- MODUS-VELGER -->
  <div class="modus-velger">
    <button class="modus-knapp aktiv" id="modus-solo">Enkeltspiller</button>
    <button class="modus-knapp" id="modus-mp">2 spillere</button>
  </div>

  <!-- ENKELTSPILLER STATS -->
  <div id="solo-stats">
    <div class="stats">
      <div class="stat-boks">
        <div class="stat-verdi" id="trekk">0</div>
        <div class="stat-label">Trekk</div>
      </div>
      <div class="stat-boks">
        <div class="stat-verdi" id="tid">0:00</div>
        <div class="stat-label">Tid</div>
      </div>
      <div class="stat-boks">
        <div class="stat-verdi" id="par">0/8</div>
        <div class="stat-label">Par</div>
      </div>
    </div>
    <div class="rekord-rad" style="margin-top:12px;">
      <div class="rekord-item">🏆 Beste trekk: <span id="rek-trekk">—</span></div>
      <div class="rekord-item">⚡ Beste tid: <span id="rek-tid">—</span></div>
    </div>
  </div>

  <!-- MULTIPLAYER STATS -->
  <div id="mp-stats" style="display:none; flex-direction:column; align-items:center; gap:12px; width:100%; max-width:420px;">
    <div class="mp-board">
      <div class="mp-spiller aktiv-spiller" id="mp-s1">
        <div class="mp-navn">Spiller 1</div>
        <div class="mp-poeng" id="mp-p1">0</div>
        <div class="mp-tur-pil" id="mp-pil1">▲ Din tur</div>
      </div>
      <div class="mp-spiller" id="mp-s2">
        <div class="mp-navn">Spiller 2</div>
        <div class="mp-poeng" id="mp-p2">0</div>
        <div class="mp-tur-pil" id="mp-pil2"></div>
      </div>
    </div>
  </div>

  <div class="kort-grid" id="grid"></div>

  <div class="knapp-rad">
    <button class="spill-knapp" id="ny-knapp">Nytt spill</button>
  </div>

</div>

<!-- SEIER-OVERLAY (enkeltspiller) -->
<div class="seier-overlay" id="seier-overlay">
  <div class="seier-boks">
    <div class="seier-emoji">🎉</div>
    <div class="seier-tittel">Bra jobbet!</div>
    <div class="seier-score">
      <div class="seier-score-item">
        <div class="seier-score-verdi" id="seier-trekk">—</div>
        <div class="seier-score-label">Trekk</div>
      </div>
      <div class="seier-score-item">
        <div class="seier-score-verdi" id="seier-tid">—</div>
        <div class="seier-score-label">Tid</div>
      </div>
    </div>
    <div class="seier-rekord" id="seier-rekord">🏆 Ny rekord!</div>
    <button class="spill-knapp" id="seier-ny-knapp" style="margin-top:8px;">Spill igjen</button>
  </div>
</div>

<!-- SEIER-OVERLAY (multiplayer) -->
<div class="seier-overlay" id="mp-seier-overlay">
  <div class="seier-boks">
    <div class="seier-emoji" id="mp-seier-emoji">🏆</div>
    <div class="seier-tittel" id="mp-seier-tittel">Spiller 1 vinner!</div>
    <div class="mp-seier-rad">
      <div class="mp-seier-spiller">
        <div class="mp-seier-poeng" id="mp-res-p1" style="color:#0071e3;">0</div>
        <div class="mp-seier-navn">Spiller 1</div>
      </div>
      <div style="font-size:1.4rem;align-self:center;color:#a1a1a6;">–</div>
      <div class="mp-seier-spiller">
        <div class="mp-seier-poeng" id="mp-res-p2" style="color:#ff2d55;">0</div>
        <div class="mp-seier-navn">Spiller 2</div>
      </div>
    </div>
    <div class="mp-seier-vinner-badge" id="mp-seier-badge">🎉 Gratulerer!</div>
    <button class="spill-knapp" id="mp-seier-ny-knapp" style="margin-top:8px;">Spill igjen</button>
  </div>
</div>

<script>
  const EMOJIER = ['🐶','🐱','🦊','🐻','🐼','🦁','🐸','🦋'];

  let kortData     = [];
  let snuddKort    = [];
  let låst         = false;
  let trekk        = 0;
  let parFunnet    = 0;
  let timerID      = null;
  let sekunder     = 0;
  let spillStartet = false;

  // Multiplayer
  let modus        = 'solo'; // 'solo' | 'mp'
  let aktivSpiller = 1;
  let poeng        = [0, 0];

  // ── LYD ──────────────────────────────────────────────────────────────────
  const lydCtx = new (window.AudioContext || window.webkitAudioContext)();

  function spill(frekvenser, varighet = 0.12, type = 'sine', volum = 0.15) {
    frekvenser.forEach((freq, i) => {
      const osc  = lydCtx.createOscillator();
      const gain = lydCtx.createGain();
      osc.connect(gain);
      gain.connect(lydCtx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      const start = lydCtx.currentTime + i * varighet * 0.5;
      gain.gain.setValueAtTime(volum, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + varighet);
      osc.start(start);
      osc.stop(start + varighet);
    });
  }

  function lydFlip()  { spill([440], 0.08, 'sine', 0.1); }
  function lydMatch() { spill([523, 659, 784], 0.12, 'sine', 0.12); }
  function lydFeil()  { spill([220, 180], 0.1, 'sawtooth', 0.06); }
  function lydSeier() { spill([523, 659, 784, 1047], 0.18, 'sine', 0.14); }

  // ── REKORD ────────────────────────────────────────────────────────────────
  function hentRekord() {
    return JSON.parse(localStorage.getItem('memory-rekord') || 'null');
  }

  function lagreRekord(t, s) {
    const rek = hentRekord();
    const nyRek = {
      trekk: rek ? Math.min(rek.trekk, t) : t,
      sek:   rek ? Math.min(rek.sek, s)   : s,
    };
    localStorage.setItem('memory-rekord', JSON.stringify(nyRek));
    return !rek || t < rek.trekk || s < rek.sek;
  }

  function visRekord() {
    const rek = hentRekord();
    document.getElementById('rek-trekk').textContent = rek ? rek.trekk        : '—';
    document.getElementById('rek-tid').textContent   = rek ? formaterTid(rek.sek) : '—';
  }

  // ── KONFETTI ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('konfetti-canvas');
  const ctx2   = canvas.getContext('2d');
  let partikler  = [];
  let konfettiID = null;

  function startKonfetti() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    partikler = Array.from({ length: 120 }, () => ({
      x:    Math.random() * canvas.width,
      y:    Math.random() * -canvas.height * 0.3,
      w:    6 + Math.random() * 8,
      h:    10 + Math.random() * 6,
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
      vx:   (Math.random() - 0.5) * 3,
      vy:   2 + Math.random() * 3,
      farge: ['#0071e3','#34c759','#ff9500','#ff3b30','#5e5ce6','#ff2d55'][Math.floor(Math.random()*6)],
      alpha: 1,
    }));
    if (konfettiID) cancelAnimationFrame(konfettiID);
    tegnKonfetti();
  }

  function tegnKonfetti() {
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
    let aktive = 0;
    partikler.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.03;
      if (p.alpha <= 0) return;
      aktive++;
      ctx2.save();
      ctx2.globalAlpha = Math.max(0, p.alpha);
      ctx2.translate(p.x, p.y);
      ctx2.rotate(p.rot);
      ctx2.fillStyle = p.farge;
      ctx2.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx2.restore();
    });
    if (aktive > 0) konfettiID = requestAnimationFrame(tegnKonfetti);
    else ctx2.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── HJELPEFUNKSJONER ──────────────────────────────────────────────────────
  function stokk(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formaterTid(sek) {
    const m = Math.floor(sek / 60);
    const s = sek % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function oppdaterStats() {
    document.getElementById('trekk').textContent = trekk;
    document.getElementById('tid').textContent   = formaterTid(sekunder);
    document.getElementById('par').textContent   = `${parFunnet}/8`;
  }

  function oppdaterMpStats() {
    document.getElementById('mp-p1').textContent = poeng[0];
    document.getElementById('mp-p2').textContent = poeng[1];
    document.getElementById('mp-s1').classList.toggle('aktiv-spiller', aktivSpiller === 1);
    document.getElementById('mp-s2').classList.toggle('aktiv-spiller', aktivSpiller === 2);
    document.getElementById('mp-pil1').textContent = aktivSpiller === 1 ? '▲ Din tur' : '';
    document.getElementById('mp-pil2').textContent = aktivSpiller === 2 ? '▲ Din tur' : '';
  }

  function startTimer() {
    clearInterval(timerID);
    timerID = setInterval(() => {
      sekunder++;
      document.getElementById('tid').textContent = formaterTid(sekunder);
    }, 1000);
  }

  // ── SPILL ─────────────────────────────────────────────────────────────────
  function byggSpill() {
    clearInterval(timerID);
    if (konfettiID) { cancelAnimationFrame(konfettiID); ctx2.clearRect(0, 0, canvas.width, canvas.height); }

    trekk        = 0;
    parFunnet    = 0;
    sekunder     = 0;
    snuddKort    = [];
    låst         = false;
    spillStartet = false;
    aktivSpiller = 1;
    poeng        = [0, 0];

    document.getElementById('seier-overlay').classList.remove('synlig');
    document.getElementById('mp-seier-overlay').classList.remove('synlig');

    if (modus === 'solo') {
      oppdaterStats();
      visRekord();
    } else {
      oppdaterMpStats();
    }

    kortData = stokk([...EMOJIER, ...EMOJIER]);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    kortData.forEach((emoji, i) => {
      const kort = document.createElement('div');
      kort.className = 'kort';
      kort.dataset.indeks = i;
      kort.innerHTML = `
        <div class="kort-indre">
          <div class="kort-forside">🂠</div>
          <div class="kort-bakside">${emoji}</div>
        </div>`;
      kort.addEventListener('click', () => kortKlikk(kort, i));
      grid.appendChild(kort);
    });
  }

  function kortKlikk(kort, indeks) {
    if (låst) return;
    if (kort.classList.contains('snudd')) return;
    if (kort.classList.contains('matchet')) return;

    if (lydCtx.state === 'suspended') lydCtx.resume();

    if (!spillStartet && modus === 'solo') {
      spillStartet = true;
      startTimer();
    }

    lydFlip();
    kort.classList.add('snudd');
    snuddKort.push({ el: kort, indeks });

    if (snuddKort.length === 2) {
      låst = true;
      if (modus === 'solo') { trekk++; oppdaterStats(); }
      sjekkMatch();
    }
  }

  function sjekkMatch() {
    const [a, b] = snuddKort;
    const match = kortData[a.indeks] === kortData[b.indeks];

    if (match) {
      lydMatch();
      a.el.classList.add('matchet');
      b.el.classList.add('matchet');
      if (modus === 'mp') {
        a.el.classList.add(`spiller${aktivSpiller}`);
        b.el.classList.add(`spiller${aktivSpiller}`);
      }
      parFunnet++;

      if (modus === 'mp') {
        poeng[aktivSpiller - 1]++;
        oppdaterMpStats();
        // Samme spiller beholder turen ved match
      } else {
        oppdaterStats();
      }

      snuddKort = [];
      låst = false;
      if (parFunnet === 8) setTimeout(seier, 300);
    } else {
      lydFeil();
      a.el.classList.add('feil');
      b.el.classList.add('feil');
      setTimeout(() => {
        a.el.classList.remove('snudd', 'feil');
        b.el.classList.remove('snudd', 'feil');
        snuddKort = [];
        låst = false;
        // Bytt tur ved feil
        if (modus === 'mp') {
          aktivSpiller = aktivSpiller === 1 ? 2 : 1;
          oppdaterMpStats();
        }
      }, 900);
    }
  }

  function seier() {
    clearInterval(timerID);
    lydSeier();
    startKonfetti();

    if (modus === 'solo') {
      const nyRekord = lagreRekord(trekk, sekunder);
      visRekord();
      document.getElementById('seier-trekk').textContent = trekk;
      document.getElementById('seier-tid').textContent   = formaterTid(sekunder);
      document.getElementById('seier-rekord').classList.toggle('skjult', !nyRekord);
      document.getElementById('seier-overlay').classList.add('synlig');
    } else {
      const [p1, p2] = poeng;
      let emoji, tittel, badge;
      if (p1 > p2) {
        emoji = '🏆'; tittel = 'Spiller 1 vinner!'; badge = '🎉 Gratulerer, Spiller 1!';
      } else if (p2 > p1) {
        emoji = '🏆'; tittel = 'Spiller 2 vinner!'; badge = '🎉 Gratulerer, Spiller 2!';
      } else {
        emoji = '🤝'; tittel = 'Uavgjort!'; badge = 'Godt spilt begge to!';
      }
      document.getElementById('mp-seier-emoji').textContent  = emoji;
      document.getElementById('mp-seier-tittel').textContent = tittel;
      document.getElementById('mp-res-p1').textContent       = p1;
      document.getElementById('mp-res-p2').textContent       = p2;
      document.getElementById('mp-seier-badge').textContent  = badge;
      document.getElementById('mp-seier-overlay').classList.add('synlig');
    }
  }

  // ── MODUS-VELGER ──────────────────────────────────────────────────────────
  document.getElementById('modus-solo').addEventListener('click', () => {
    modus = 'solo';
    document.getElementById('modus-solo').classList.add('aktiv');
    document.getElementById('modus-mp').classList.remove('aktiv');
    document.getElementById('solo-stats').style.display = '';
    document.getElementById('mp-stats').style.display   = 'none';
    byggSpill();
  });

  document.getElementById('modus-mp').addEventListener('click', () => {
    modus = 'mp';
    document.getElementById('modus-mp').classList.add('aktiv');
    document.getElementById('modus-solo').classList.remove('aktiv');
    document.getElementById('solo-stats').style.display = 'none';
    document.getElementById('mp-stats').style.display   = 'flex';
    byggSpill();
  });

  document.getElementById('ny-knapp').addEventListener('click', byggSpill);
  document.getElementById('seier-ny-knapp').addEventListener('click', byggSpill);
  document.getElementById('mp-seier-ny-knapp').addEventListener('click', byggSpill);

  document.getElementById('seier-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) byggSpill();
  });
  document.getElementById('mp-seier-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) byggSpill();
  });

  if (localStorage.getItem('tema') === 'dark') document.body.classList.add('dark');

  byggSpill();
</script>
</body>
</html>

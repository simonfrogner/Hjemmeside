<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    color: #fff;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition: background 0.4s;
  }

  body.retro { background: #0a1a0a; }
  body.minimal { background: #111; }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, #0d0d2b 0%, #0a0a1a 70%);
    animation: bgPulse 8s ease-in-out infinite;
    z-index: -2;
    transition: background 0.4s;
  }

  body.retro::before { background: radial-gradient(ellipse at center, #0d1f0d 0%, #0a1a0a 70%); }
  body.minimal::before { background: radial-gradient(ellipse at center, #1a1a1a 0%, #111 70%); }

  @keyframes bgPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: rgba(0, 255, 255, 0.3);
    border-radius: 50%;
    animation: float linear infinite;
    z-index: -1;
  }

  body.retro .particle { background: rgba(0, 255, 0, 0.3); }
  body.minimal .particle { background: rgba(180, 180, 180, 0.2); }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
  }

  .game-wrapper {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    perspective: 1000px;
  }

  .side-panel {
    width: 160px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-box {
    background: rgba(10, 10, 40, 0.8);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.3);
  }

  body.retro .panel-box { border-color: rgba(0, 255, 0, 0.2); box-shadow: 0 0 20px rgba(0,255,0,0.05), inset 0 0 20px rgba(0,0,0,0.3); }
  body.minimal .panel-box { border-color: rgba(180,180,180,0.15); box-shadow: none; }

  .panel-box h3 {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0, 255, 255, 0.6);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  body.retro .panel-box h3 { color: rgba(0, 255, 0, 0.6); }
  body.minimal .panel-box h3 { color: rgba(180, 180, 180, 0.5); }

  .score-value {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  body.retro .score-value { background: linear-gradient(135deg, #00ff00, #ffaa00); -webkit-background-clip: text; }
  body.minimal .score-value { background: linear-gradient(135deg, #ccc, #888); -webkit-background-clip: text; }

  .level-value {
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-align: center;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
  }

  body.retro .level-value { color: #00ff44; text-shadow: 0 0 20px rgba(0,255,68,0.5); }
  body.minimal .level-value { color: #bbb; text-shadow: none; }

  .lines-value {
    font-size: 20px;
    font-weight: 700;
    color: #ffaa00;
    text-align: center;
  }

  body.minimal .lines-value { color: #999; }

  #next-canvas {
    display: block;
    margin: 0 auto;
  }

  .game-board-container {
    position: relative;
    border-radius: 16px;
    padding: 3px;
    background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(255, 0, 255, 0.3), rgba(0, 255, 136, 0.3));
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), 0 0 80px rgba(255, 0, 255, 0.1);
    animation: borderGlow 4s ease-in-out infinite;
  }

  body.retro .game-board-container { background: linear-gradient(135deg, rgba(0,255,0,0.3), rgba(255,170,0,0.3)); box-shadow: 0 0 40px rgba(0,255,0,0.15); }
  body.minimal .game-board-container { background: rgba(100,100,100,0.3); box-shadow: none; animation: none; }

  @keyframes borderGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), 0 0 80px rgba(255, 0, 255, 0.1); }
    50% { box-shadow: 0 0 60px rgba(0, 255, 255, 0.25), 0 0 120px rgba(255, 0, 255, 0.15); }
  }

  #game-canvas {
    display: block;
    border-radius: 14px;
    background: rgba(5, 5, 20, 0.95);
  }

  body.retro #game-canvas { background: rgba(0, 10, 0, 0.97); }
  body.minimal #game-canvas { background: rgba(10, 10, 10, 0.98); }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 20, 0.85);
    border-radius: 14px;
    backdrop-filter: blur(5px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay h1 {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 8px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  .overlay p {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
    animation: blink 1.5s ease-in-out infinite;
  }

  .overlay .game-over-text {
    font-size: 28px;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    letter-spacing: 6px;
  }

  .overlay .final-score {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.7);
    margin: 16px 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Difficulty selector in start overlay */
  .start-name-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(0,255,255,0.35);
    border-radius: 8px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 8px 14px;
    text-align: center;
    text-transform: uppercase;
    width: 180px;
    margin-bottom: 18px;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
    touch-action: auto;
  }

  .start-name-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 3px; }
  .start-name-input:focus { border-color: rgba(0,255,255,0.7); }

  .diff-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .diff-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(10,10,40,0.7);
    color: rgba(255,255,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .diff-btn:hover { background: rgba(0,255,255,0.12); color: #fff; }

  .diff-btn.active {
    border-color: #00ffff;
    background: rgba(0,255,255,0.18);
    color: #00ffff;
    text-shadow: 0 0 10px rgba(0,255,255,0.6);
    box-shadow: 0 0 14px rgba(0,255,255,0.2);
  }

  /* Theme picker */
  .theme-picker {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .theme-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }

  .theme-dot:hover { transform: scale(1.2); }
  .theme-dot.active { border-color: rgba(255,255,255,0.7); transform: scale(1.1); }
  .theme-dot[data-theme="neon"]    { background: #00ffff; box-shadow: 0 0 8px rgba(0,255,255,0.6); }
  .theme-dot[data-theme="retro"]   { background: #00cc44; box-shadow: 0 0 8px rgba(0,204,68,0.6); }
  .theme-dot[data-theme="minimal"] { background: #888; box-shadow: 0 0 8px rgba(136,136,136,0.4); }

  .controls-info {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 1px;
    line-height: 2;
    text-align: center;
  }

  .hs-list {
    list-style: none;
    margin: 0; padding: 0;
    font-size: 11px;
    line-height: 2;
  }

  .hs-list li {
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
  }

  .hs-list li.hs-current {
    color: #ffee00;
    text-shadow: 0 0 8px rgba(255, 238, 0, 0.5);
  }

  .new-hs-badge {
    font-size: 13px;
    color: #ffee00;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255, 238, 0, 0.6);
    margin: 8px 0 4px;
    animation: titlePulse 1s ease-in-out infinite;
  }

  .new-hs-badge.hidden { display: none; }

  .share-btn {
    margin-top: 12px;
    padding: 8px 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .share-btn:active { transform: scale(0.95); }

  .gameover-hs {
    list-style: none;
    margin: 8px 0 0;
    padding: 0;
    font-size: 12px;
    letter-spacing: 1px;
    line-height: 1.9;
    text-align: center;
  }

  .gameover-hs li { color: rgba(255,255,255,0.45); }
  .gameover-hs li.hs-current { color: #ffee00; text-shadow: 0 0 8px rgba(255,238,0,0.5); }

  /* Line clear flash */
  @keyframes lineFlash {
    0% { background: rgba(255, 255, 255, 0.8); }
    100% { background: transparent; }
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 20;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    background: rgba(5, 5, 20, 0.95);
    border-top: 1px solid rgba(0, 255, 255, 0.15);
  }

  .mobile-controls-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .mobile-controls-row + .mobile-controls-row {
    margin-top: 6px;
  }

  .mobile-btn {
    width: 62px; height: 48px;
    border-radius: 12px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    background: rgba(10, 10, 40, 0.9);
    color: #00ffff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s, transform 0.1s;
  }

  .mobile-btn:active {
    background: rgba(0, 255, 255, 0.25);
    transform: scale(0.92);
  }

  .mobile-btn.wide {
    flex: 1;
    max-width: 130px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .mobile-btn.small {
    width: 40px; height: 40px;
    font-size: 15px;
    border-radius: 50%;
    color: rgba(0, 255, 255, 0.5);
    border-color: rgba(0, 255, 255, 0.15);
  }

  @media (max-width: 700px), (pointer: coarse) {
    body {
      padding: 0;
      align-items: flex-start;
    }
    .mobile-controls { display: block; }
    .game-wrapper {
      flex-direction: column;
      align-items: center;
      gap: 0;
      transform: none;
      width: 100%;
    }
    .side-panel {
      flex-direction: row;
      width: 100%;
      gap: 0;
      padding: 6px 10px;
      justify-content: center;
      align-items: center;
    }
    .side-panel .panel-box {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      padding: 2px 10px;
      min-width: 0;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .side-panel .panel-box h3 {
      font-size: 8px;
      margin-bottom: 0;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
    }
    .score-value { font-size: 14px; }
    .level-value { font-size: 14px; text-shadow: none; }
    .lines-value { font-size: 14px; }
    .controls-info { display: none !important; }
    /* Hide next-piece, hold, theme, mute panels on mobile */
    .side-panel .panel-box:has(#next-canvas),
    .side-panel .panel-box:has(.theme-picker),
    .side-panel .panel-box:has(#mute-btn) { display: none; }
    .game-board-container {
      padding: 2px;
      border-radius: 8px;
      animation: none;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }
    #game-canvas {
      border-radius: 6px;
    }
    .overlay h1 { font-size: 28px; letter-spacing: 4px; }
    .overlay .game-over-text { font-size: 22px; }
    .overlay p { font-size: 10px; }
    .start-name-input { font-size: 11px; width: 150px; }
    .diff-btns { gap: 6px; }
    .diff-btn { font-size: 9px; padding: 7px 10px; }
  }

  .nav-back {
    position: fixed; top: 16px; left: 16px; z-index: 1000;
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 14px; border-radius: 980px;
    transition: background 0.2s, color 0.2s;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .nav-back:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
</style>

<div class="game-wrapper">
  <div class="side-panel">
    <div class="panel-box">
      <h3>Poeng</h3>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="panel-box">

    </div>
    <div class="panel-box controls-info">
      ← → FLYTT<br>

      ↓ RASKERE<br>
      SPACE SLIPP<br>
      P PAUSE<br>
      M MUSIKK
    </div>
    <div class="panel-box" style="text-align:center;">
      <div id="mute-btn" onclick="BGM.toggleMute()" style="cursor:pointer;font-size:24px;user-select:none;">🔊</div>
    </div>
  </div>

  <div class="game-board-container">
    <canvas id="game-canvas" width="300" height="600"></canvas>
    <div class="overlay" id="start-overlay">
      <h1>TETRIS</h1>
      <input
        type="text"
        class="start-name-input"
        id="player-name-input"
        placeholder="DITT NAVN"
        maxlength="10"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <div class="diff-btns">
        <button class="diff-btn" data-diff="lett" onclick="startGame('lett')">LETT</button>
        <button class="diff-btn active" data-diff="normal" onclick="startGame('normal')">NORMAL</button>
        <button class="diff-btn" data-diff="hardt" onclick="startGame('hardt')">HARDT</button>

    </div>

  </div>
</div>

    <div class="mobile-btn" data-action="left">◀</div>

    <div class="mobile-btn" data-action="rotate">↻</div>
    <div class="mobile-btn" data-action="right">▶</div>

  </div>
</div>

<script>
// ── Audio Engine (Web Audio API) ──────────────────────
let audioCtx;
let audioUnlocked = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function unlockAudio() {
  if (audioUnlocked) return;
  ensureAudio();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  src.onended = () => { audioUnlocked = true; };
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

['touchstart', 'touchend', 'click'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { once: false, passive: true });
});

function playTone(freq, duration, type = 'square', volume = 0.12, detune = 0) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2500;
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume = 0.08) {
  ensureAudio();
  if (audioCtx.state === 'suspended') return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 800;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

const SFX = {
  move() {
    playTone(220, 0.06, 'square', 0.06);
  },
  rotate() {
    playTone(440, 0.08, 'square', 0.08);
    playTone(550, 0.06, 'square', 0.05);
  },
  softDrop() {
    playTone(150, 0.04, 'square', 0.05);
  },
  hardDrop() {
    playNoise(0.12, 0.15);
    playTone(100, 0.15, 'triangle', 0.12);
  },
  lock() {
    playTone(180, 0.1, 'triangle', 0.08);
    playNoise(0.06, 0.06);
  },
  lineClear(count) {
    const baseFreq = 330;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        playTone(baseFreq + i * 110, 0.2, 'square', 0.1);
        playTone(baseFreq + i * 110 + 5, 0.2, 'sawtooth', 0.04, 10);
      }, i * 60);
    }
    if (count === 4) {
      setTimeout(() => {
        playTone(880, 0.3, 'square', 0.12);
        playTone(1100, 0.25, 'sawtooth', 0.06);
        playNoise(0.15, 0.1);
      }, 250);
    }
  },
  levelUp() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.15, 'square', 0.1), i * 80);
    });
  },
  gameOver() {
    const notes = [440, 370, 311, 261];
    notes.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 0.4, 'sawtooth', 0.1);
        playTone(f, 0.4, 'square', 0.06, -8);
      }, i * 200);
    });
  },
  start() {
    const notes = [261, 329, 392, 523];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.12, 'square', 0.08), i * 70);
    });
  }
};

// ── Background Music (Korobeiniki) ───────────────────
const BGM = {
  playing: false,
  scheduledUntil: 0,
  timerId: null,
  masterGain: null,
  bpm: 140,
  muted: false,

  melody: [
    [659,2],[494,1],[523,1],[587,2],[523,1],[494,1],
    [440,2],[440,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],

    [587,2],[587,1],[698,1],[880,2],[784,1],[698,1],
    [659,2],[659,1],[523,1],[659,2],[587,1],[523,1],
    [494,2],[494,1],[523,1],[587,2],[659,2],
    [523,2],[440,2],[440,2],[0,2],
  ],

  bass: [
    [165,4],[131,4],[147,4],[131,4],
    [147,4],[165,4],[131,4],[110,4],
    [147,4],[175,4],[147,4],[131,4],
    [165,4],[131,4],[110,4],[110,4],
  ],

  start() {
    if (this.playing) return;
    unlockAudio();
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    this.playing = true;
    this.masterGain = audioCtx.createGain();
    this.masterGain.gain.value = this.muted ? 0 : 0.08;
    this.masterGain.connect(audioCtx.destination);
    this.scheduledUntil = audioCtx.currentTime + 0.1;
    this.scheduleAhead();
  },

  stop() {
    this.playing = false;
    if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
    if (this.masterGain) {
      this.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      this.masterGain = null;
    }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.masterGain) {
      this.masterGain.gain.setValueAtTime(this.muted ? 0 : 0.08, audioCtx.currentTime);
    }
    const mb = document.getElementById('mute-btn');
    const mbm = document.getElementById('mute-btn-mobile');
    if (mb) mb.textContent = this.muted ? '🔇' : '🔊';
    if (mbm) mbm.textContent = this.muted ? '🔇' : '🔊';
  },

  scheduleAhead() {
    if (!this.playing || !this.masterGain) return;
    const lookAhead = 2;
    while (this.scheduledUntil < audioCtx.currentTime + lookAhead) {
      this.scheduleMelodyPass(this.scheduledUntil);
      const beatLen = 60 / this.bpm;
      const totalBeats = this.melody.reduce((s, n) => s + n[1], 0);
      this.scheduledUntil += totalBeats * beatLen;
    }
    this.timerId = setTimeout(() => this.scheduleAhead(), 500);
  },

  scheduleMelodyPass(startTime) {
    const beatLen = 60 / this.bpm;

    let t = startTime;
    for (const [freq, beats] of this.melody) {
      if (freq > 0) {
        this.scheduleNote(freq, t, beats * beatLen * 0.85, 'square', 0.7);
        this.scheduleNote(freq * 0.667, t, beats * beatLen * 0.6, 'triangle', 0.2);
      }
      t += beats * beatLen;
    }

    const melodyDuration = t - startTime;
    const bassBeatTotal = this.bass.reduce((s, n) => s + n[1], 0);
    const bassDuration = bassBeatTotal * beatLen;
    let bt = startTime;
    while (bt < startTime + melodyDuration - 0.01) {
      for (const [freq, beats] of this.bass) {
        if (bt >= startTime + melodyDuration) break;
        if (freq > 0) {
          this.scheduleNote(freq, bt, beats * beatLen * 0.7, 'triangle', 0.5);
        }
        bt += beats * beatLen;
      }
    }

    let dt = startTime;
    const stepLen = beatLen;
    while (dt < startTime + melodyDuration - 0.01) {
      this.scheduleDrum(dt, 0.4);
      if (Math.round((dt - startTime) / beatLen) % 2 === 1) {
        this.scheduleHihat(dt, 0.15);
      }
      dt += stepLen;
    }
  },

  scheduleNote(freq, time, duration, type, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.setValueAtTime(vol * 0.12, time + duration * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + duration + 0.01);
  },

  scheduleDrum(time, vol) {
    if (!this.masterGain) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    gain.gain.setValueAtTime(vol * 0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start(time);
    osc.stop(time + 0.12);
  },

  scheduleHihat(time, vol) {
    if (!this.masterGain) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 7000;
    gain.gain.setValueAtTime(vol * 0.12, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    src.start(time);
  }
};

// ── Constants ──────────────────────────────────────────
const COLS = 10, ROWS = 20, BLOCK = 30;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

// ── Difficulty config ─────────────────────────────────
const DIFF_CONFIG = {
  lett:   { startInterval: 1100, minInterval: 150 },
  normal: { startInterval: 800,  minInterval: 50  },
  hardt:  { startInterval: 450,  minInterval: 30  },
};

// ── State ──────────────────────────────────────────────
let board, current, next, score, lines, level, gameState, dropInterval, lastDrop;
let flashRows = [], flashTimer = 0;
let shakeAmount = 0;
let combo = 0;
let currentDifficulty = 'normal';
let particles = [];

// ── Background particles ──────────────────────────────
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
  document.body.appendChild(p);
}

// ── Helpers ───────────────────────────────────────────
function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    glow: p.glow,
    x: Math.floor((COLS - p.shape[0].length) / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const rotated = Array.from({ length: cols }, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      rotated[c][rows - 1 - r] = shape[r][c];
  return rotated;
}

function valid(shape, px, py) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c]) {
        const ny = current.y + r;
        if (ny < 0) { gameOver(); return; }
        board[ny][current.x + c] = { color: current.color, glow: current.glow };
      }
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) gameOver();
}

function spawnParticles(fullRows) {
  const B = window._mobileBlock || BLOCK;
  for (const r of fullRows) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (!cell) continue;
      const count = 4;
      for (let i = 0; i < count; i++) {
        const cx = (c + 0.5) * B;
        const cy = (r + 0.5) * B;
        particles.push({
          x: cx,
          y: cy,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.8) * 6,
          color: cell.color,
          alpha: 1,
          size: 3 + Math.random() * 3
        });
      }
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25; // gravity
    p.alpha -= 0.025;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }
}

function clearLines() {
  const full = [];
  for (let r = 0; r < ROWS; r++)
    if (board[r].every(cell => cell)) full.push(r);

  if (full.length === 0) { combo = 0; SFX.lock(); return; }

  // Vibration
  if (navigator.vibrate) {
    if (full.length === 4) {
      navigator.vibrate([80, 30, 80]);
    } else {
      navigator.vibrate(30 * full.length);
    }
  }

  // Spawn particles BEFORE removing rows
  spawnParticles(full);

  combo++;
  flashRows = full;
  flashTimer = 12;

  const pts = [0, 100, 300, 500, 800][full.length] * level;
  const comboBonus = combo > 1 ? 50 * (combo - 1) * level : 0;
  score += pts + comboBonus;
  lines += full.length;
  const prevLevel = level;
  level = Math.floor(lines / 10) + 1;

  const cfg = DIFF_CONFIG[currentDifficulty];
  dropInterval = Math.max(cfg.minInterval, cfg.startInterval - (level - 1) * 70);

  if (level > prevLevel) SFX.levelUp();

  shakeAmount = full.length >= 4 ? 8 : full.length >= 2 ? 4 : 2;
  SFX.lineClear(full.length);

  setTimeout(() => {
    for (const r of full) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
    }
  }, 150);

  updateUI();
}

function ghostY() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  return gy;
}

// ── Drawing ───────────────────────────────────────────
function drawBlock(context, x, y, color, glow, size = BLOCK, ghost = false) {
  const px = x * size, py = y * size;
  const inset = 1;

  if (ghost) {
    context.strokeStyle = color;
    context.globalAlpha = 0.25;
    context.lineWidth = 1.5;
    context.strokeRect(px + inset, py + inset, size - inset * 2, size - inset * 2);
    context.globalAlpha = 1;
    return;
  }

  context.shadowColor = glow;
  context.shadowBlur = 12;

  const grad = context.createLinearGradient(px, py, px + size, py + size);
  grad.addColorStop(0, color);
  grad.addColorStop(1, shadeColor(color, -30));
  context.fillStyle = grad;
  context.fillRect(px + inset, py + inset, size - inset * 2, size - inset * 2);

  context.shadowBlur = 0;
  context.fillStyle = 'rgba(255,255,255,0.15)';
  context.fillRect(px + inset, py + inset, size - inset * 2, 3);
  context.fillRect(px + inset, py + inset, 3, size - inset * 2);

  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.fillRect(px + size - inset - 3, py + inset, 3, size - inset * 2);
  context.fillRect(px + inset, py + size - inset - 3, size - inset * 2, 3);
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `rgb(${r},${g},${b})`;
}

function draw() {
  const B = window._mobileBlock || BLOCK;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * shakeAmount;
    const sy = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(sx, sy);
    shakeAmount *= 0.85;
    if (shakeAmount < 0.3) shakeAmount = 0;
  }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * B); ctx.lineTo(canvas.width, r * B); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * B, 0); ctx.lineTo(c * B, canvas.height); ctx.stroke();
  }

  // Board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) {
        if (flashRows.includes(r) && flashTimer > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flashTimer / 12 * 0.8})`;
          ctx.fillRect(c * B, r * B, B, B);
        } else {
          drawBlock(ctx, c, r, board[r][c].color, board[r][c].glow, B);
        }
      }

  if (flashTimer > 0) flashTimer--;

  if (current && gameState === 'playing') {
    // Ghost piece
    const gy = ghostY();
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, gy + r, current.color, current.glow, B, true);

    // Current piece
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, current.x + c, current.y + r, current.color, current.glow, B);
  }

  // Particles
  updateParticles();
  drawParticles();

  ctx.restore();

  drawNext();
}

function drawNext() {
  const size = 24;
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!next) return;
  const offsetX = (nextCanvas.width - next.shape[0].length * size) / 2;
  const offsetY = (nextCanvas.height - next.shape.length * size) / 2;
  nextCtx.save();
  nextCtx.translate(offsetX, offsetY);
  for (let r = 0; r < next.shape.length; r++)
    for (let c = 0; c < next.shape[r].length; c++)
      if (next.shape[r][c]) {
        const px = c * size, py = r * size;
        nextCtx.shadowColor = next.glow;
        nextCtx.shadowBlur = 10;
        const grad = nextCtx.createLinearGradient(px, py, px + size, py + size);
        grad.addColorStop(0, next.color);
        grad.addColorStop(1, shadeColor(next.color, -30));
        nextCtx.fillStyle = grad;
        nextCtx.fillRect(px + 1, py + 1, size - 2, size - 2);
        nextCtx.shadowBlur = 0;
        nextCtx.fillStyle = 'rgba(255,255,255,0.15)';
        nextCtx.fillRect(px + 1, py + 1, size - 2, 2);
      }
  nextCtx.restore();
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

// ── Game Logic ────────────────────────────────────────
function init(diff) {
  board = createBoard();
  score = 0; lines = 0; level = 1; combo = 0;
  particles = [];
  const cfg = DIFF_CONFIG[diff || 'normal'];
  dropInterval = cfg.startInterval;
  current = randomPiece();
  next = randomPiece();
  updateUI();
}

function gameOver() {
  gameState = 'over';
  BGM.stop();
  SFX.gameOver();
  const name = getPlayerName();
  saveHighscore(score, name);
  renderSideHs();
  renderGameoverHs(score);
  document.getElementById('final-score').textContent = `POENG: ${score.toLocaleString()}`;
  document.getElementById('gameover-overlay').classList.remove('hidden');
}

function showOverlay(id) {
  ['start-overlay', 'pause-overlay', 'gameover-overlay'].forEach(oid => {
    document.getElementById(oid).classList.toggle('hidden', oid !== id);
  });
}

function startGame(diff) {
  // Save name from input if on start screen
  const nameInput = document.getElementById('player-name-input');
  if (nameInput && nameInput.value.trim()) {
    savePlayerName(nameInput.value);
  }

  const useDiff = diff || currentDifficulty;
  currentDifficulty = useDiff;

  unlockAudio();
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  SFX.start();
  init(useDiff);
  gameState = 'playing';
  ['start-overlay', 'pause-overlay', 'gameover-overlay'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  if (typeof resizeCanvas === 'function') resizeCanvas();
  lastDrop = performance.now();
  BGM.stop();
  setTimeout(() => BGM.start(), 300);
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
  if (gameState !== 'playing') return;

  if (timestamp - lastDrop > dropInterval) {
    if (valid(current.shape, current.x, current.y + 1)) {
      current.y++;
    } else {
      lock();
    }
    lastDrop = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// ── Input ─────────────────────────────────────────────
function handleInput(action) {
  if (gameState !== 'playing') return;
  switch (action) {
    case 'left':
      if (valid(current.shape, current.x - 1, current.y)) { current.x--; SFX.move(); }
      break;
    case 'right':
      if (valid(current.shape, current.x + 1, current.y)) { current.x++; SFX.move(); }
      break;
    case 'down':
      if (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 1;
        SFX.softDrop();
        updateUI();
      }
      break;
    case 'rotate': {
      const rotated = rotate(current.shape);
      let kicked = false;
      for (const kick of [0, -1, 1, -2, 2]) {
        if (valid(rotated, current.x + kick, current.y)) {
          current.shape = rotated;
          current.x += kick;
          kicked = true;
          break;
        }
      }
      if (kicked) SFX.rotate();
      break;
    }
    case 'drop':
      while (valid(current.shape, current.x, current.y + 1)) {
        current.y++;
        score += 2;
      }
      SFX.hardDrop();
      lock();
      updateUI();
      lastDrop = performance.now();
      break;
  }
}

document.addEventListener('keydown', e => {
  if (gameState === 'over' && e.key !== 'p' && e.key !== 'P') {
    startGame(currentDifficulty);
    return;
  }

  if (e.key === 'm' || e.key === 'M') {
    BGM.toggleMute();
    return;
  }

  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') {
      gameState = 'paused';
      BGM.stop();
      document.getElementById('pause-overlay').classList.remove('hidden');
    } else if (gameState === 'paused') {
      gameState = 'playing';
      BGM.start();
      document.getElementById('pause-overlay').classList.add('hidden');
      lastDrop = performance.now();
      requestAnimationFrame(gameLoop);
    }
    return;
  }

  const keyMap = {
    'ArrowLeft': 'left', 'ArrowRight': 'right',
    'ArrowDown': 'down', 'ArrowUp': 'rotate',
    ' ': 'drop'
  };
  if (keyMap[e.key]) {
    e.preventDefault();
    handleInput(keyMap[e.key]);
  }
});

// Start on click: only gameover restarts (not start-overlay)
document.getElementById('gameover-overlay').addEventListener('click', () => startGame(currentDifficulty));
document.getElementById('gameover-overlay').addEventListener('touchend', e => {
  e.preventDefault();
  startGame(currentDifficulty);
}, { passive: false });

// Prevent clicks on start-overlay from bubbling to diff buttons (already handled by onclick)
// Highlight selected diff button
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  btn.addEventListener('mouseleave', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.diff-btn[data-diff="${currentDifficulty}"]`).classList.add('active');
  });
});

// Restore diff button highlight on page load
document.querySelector(`.diff-btn[data-diff="normal"]`).classList.add('active');

// ── Mobile touch handling ─────────────────────────────
(function() {
  const controls = document.getElementById('mobile-controls');
  let repeatTimer = null, repeatInterval = null;

  function stopRepeat() {
    clearTimeout(repeatTimer);
    clearInterval(repeatInterval);
    repeatTimer = null;
    repeatInterval = null;
  }

  controls.addEventListener('touchstart', e => {
    e.preventDefault();
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'pause') {
      const ev = new KeyboardEvent('keydown', { key: 'p' });
      document.dispatchEvent(ev);
      return;
    }
    if (action === 'mute') {
      BGM.toggleMute();
      btn.textContent = BGM.muted ? '🔇' : '🔊';
      return;
    }

    if (gameState !== 'playing') return;
    handleInput(action);

    if (['left', 'right', 'down'].includes(action)) {
      stopRepeat();
      repeatTimer = setTimeout(() => {
        repeatInterval = setInterval(() => {
          if (gameState === 'playing') handleInput(action);
        }, 60);
      }, 180);
    }
  }, { passive: false });

  controls.addEventListener('touchend', e => {
    e.preventDefault();
    stopRepeat();
  }, { passive: false });

  controls.addEventListener('touchcancel', e => {
    stopRepeat();
  });

  // Swipe gestures on the game canvas
  const gameCanvas = document.getElementById('game-canvas');
  let touchStartX, touchStartY, touchStartTime, swiped;

  gameCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = Date.now();
    swiped = false;
  }, { passive: false });

  gameCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (gameState !== 'playing' || swiped) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const threshold = 30;

    if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
      handleInput(dx > 0 ? 'right' : 'left');
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    } else if (dy > threshold) {
      handleInput('down');
      touchStartY = t.clientY;
    }
  }, { passive: false });

  gameCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    const elapsed = Date.now() - touchStartTime;
    if (!swiped && elapsed < 200) {
      handleInput('rotate');
    }
  }, { passive: false });

  // Prevent page scroll/bounce/zoom
  document.addEventListener('touchmove', e => {
    if (e.target.closest('.game-board-container, .mobile-controls')) {
      e.preventDefault();
    }
  }, { passive: false });

  // Prevent double-tap zoom
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    // Allow text input interactions
    if (e.target.tagName === 'INPUT') return;
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
})();

// ── Dynamic canvas scaling for mobile ─────────────────
function resizeCanvas() {
  const isMobile = window.innerWidth <= 700 || matchMedia('(pointer: coarse)').matches;
  if (!isMobile) {
    canvas.width = 300;
    canvas.height = 600;
    window._mobileBlock = null;
    return;
  }
  const mobileControls = document.getElementById('mobile-controls');
  const sidePanel = document.querySelector('.side-panel');
  const controlsH = mobileControls.offsetHeight || 110;
  const panelH = sidePanel ? sidePanel.offsetHeight : 30;
  const availH = window.innerHeight - panelH - controlsH - 12;
  const availW = window.innerWidth - 8;
  const blockFromW = Math.floor(availW / COLS);
  const blockFromH = Math.floor(availH / ROWS);
  const block = Math.max(10, Math.min(blockFromW, blockFromH, 30));
  canvas.width = block * COLS;
  canvas.height = block * ROWS;
  window._mobileBlock = block;
}

window.addEventListener('resize', () => { resizeCanvas(); draw(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { resizeCanvas(); draw(); }, 200); });
resizeCanvas();

// ── Name input: allow text input (override user-select) ──
const nameInput = document.getElementById('player-name-input');
nameInput.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: true });
nameInput.addEventListener('input', () => {
  nameInput.value = nameInput.value.toUpperCase();
});
// Load saved name
const savedName = getPlayerName();
if (savedName) nameInput.value = savedName;

// ── Init ──────────────────────────────────────────────
loadTheme();
init('normal');
renderSideHs();
draw();
</script>
